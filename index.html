                                      const val = h.number || h.name;
                                      const isSelected = sel.includes(val);
                                      return (
                                        <button
                                          key={h.id}
                                          type="button"
                                          onClick={() => toggleSelectHorse(rowNum, val)}
                                          className={`px-3 py-1.5 rounded-xl border text-xs font-bold transition-all ${isSelected ? 'bg-green-600 text-white border-green-600 ring-1 ring-green-600' : 'bg-gray-50 text-gray-700 border-gray-200 hover:bg-gray-100'}`}
                                        >
                                          {h.number ? `${h.number}.` : ''}{h.name} {h.mark !== '-' ? `(${h.mark})` : ''}
                                        </button>
                                      );
                                    })
                                  )
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>

                  {/* 1点あたり金額 */}
                  <div className="border-t border-gray-100 pt-3">
                    <span className="text-xs text-gray-400 font-bold block mb-2">1点あたりの金額 (円)</span>
                    <div className="flex gap-2 mb-2">
                      <input 
                        type="number" 
                        inputMode="numeric"
                        pattern="[0-9]*"
                        value={betAmountPerBet || ''} 
                        onChange={e => setBetAmountPerBet(e.target.value)} 
                        className="w-28 border border-gray-200 rounded-xl p-2 text-center text-sm font-bold outline-none focus:border-green-600 bg-gray-50"
                        placeholder="100"
                        min="100" 
                        step="100"
                      />
                      <span className="self-center font-bold text-gray-500 text-xs">円</span>
                    </div>
                    <div className="flex flex-wrap gap-1.5 text-xs font-bold">
                      {[100, 300, 500, 1000, 5000].map(amt => (
                        <button
                          key={amt}
                          type="button"
                          onClick={() => setBetAmountPerBet(prev => (parseInt(prev) || 0) + amt)}
                          className="px-3 py-1.5 rounded-lg border border-gray-200 bg-gray-50 hover:bg-gray-100 text-gray-600 transition-colors"
                        >
                          +{amt.toLocaleString()}円
                        </button>
                      ))}
                      <button
                        type="button"
                        onClick={() => setBetAmountPerBet('')}
                        className="px-3 py-1.5 rounded-lg border border-red-200 bg-red-50 hover:bg-red-100 text-red-600 transition-colors ml-auto"
                      >
                        クリア
                      </button>
                    </div>
                  </div>

                  {/* プレビュー・追加ボタン */}
                  <div className="border-t border-gray-100 pt-3 flex justify-between items-center bg-green-50/50 -mx-4 -mb-4 p-4 rounded-b-2xl">
                    <div className="text-xs">
                      <p className="text-gray-500 font-bold">買い目点数: <span className="text-base text-gray-800 font-extrabold">{combinationCount}</span> 点</p>
                      <p className="text-gray-500 font-bold">合計金額: <span className="text-base text-green-700 font-extrabold">{totalAmountPreview.toLocaleString()}円</span></p>
                    </div>
                    <button
                      type="submit"
                      disabled={combinationCount <= 0}
                      className="bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-6 rounded-xl text-xs disabled:opacity-40 shadow transition-colors"
                    >
                      買い目に追加
                    </button>
                  </div>
                </form>

                {/* 2. 登録済み買い目リスト */}
                {/* 2. 登録済み買い目リスト */}
                <div className="space-y-3">
                  <h3 className="font-bold text-gray-800 flex items-center gap-1.5">📋 登録済みの買い目</h3>
                  {currentBets.length === 0 ? (
                    <div className="text-center py-8 bg-white border border-gray-100 border-dashed rounded-2xl">
                      <p className="text-gray-400 text-xs font-medium">登録された買い目はありません</p>
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {currentBets.map((bet) => {
                        const combList = expandBet(bet, activeRace.result);
                        const isBetHit = combList.some(c => c.isHit);
                        return (
                          <div 
                            key={bet.id} 
                            className={`p-3 rounded-xl border shadow-sm flex flex-col gap-2 transition-all ${
                              isBetHit 
                                ? 'bg-green-50/40 border-green-200 ring-1 ring-green-100' 
                                : 'bg-white border-gray-100'
                            }`}
                          >
                            <div className="flex items-center justify-between gap-3">
                              <div className="flex-1 min-w-0">
                                <div className="flex flex-wrap items-center gap-1.5 mb-1">
                                  {isBetHit && (
                                    <span className="bg-red-500 text-white text-[9px] font-extrabold px-1.5 py-0.5 rounded shadow-sm flex items-center gap-0.5 animate-fade-in">
                                      <span>🎯</span> 的中
                                    </span>
                                  )}
                                  <span className="bg-green-50 text-green-700 text-[10px] font-bold px-1.5 py-0.5 rounded border border-green-100">
                                    {bet.type}
                                  </span>
                                  <span className="bg-gray-100 text-gray-600 text-[10px] font-bold px-1.5 py-0.5 rounded">
                                    {bet.method === 'normal' ? '通常' : bet.method === 'box' ? 'ボックス' : 'フォーメーション'}
                                  </span>
                                  <span className="text-[11px] text-gray-400 font-medium">
                                    {bet.combinationCount}点 × 各{bet.amountPerBet}円
                                  </span>
                                </div>
                                <div className="text-sm font-bold text-gray-800">
                                  {renderBetHorses(bet, activeRace.result)}
                                </div>
                              </div>
                              <div className="text-right flex-shrink-0 flex items-center gap-2">
                                <span className="text-sm font-extrabold text-gray-800 mr-1">
                                  {(bet.totalAmount || 0).toLocaleString()}円
                                </span>
                                <button 
                                  type="button"
                                  onClick={() => handleDeleteBet(activeRace.id, bet.id)} 
                                  className="text-gray-300 hover:text-red-500 p-1.5 rounded-full transition-colors"
                                >
                                  <Trash2 size={16} />
                                </button>
                              </div>
                            </div>

                            {/* 分解組み合わせリスト */}
                            {combList.length > 1 && (
                              <div className="flex flex-wrap gap-1.5 pt-2 border-t border-gray-100 text-[10px] font-bold">
                                {combList.map((c, idx) => (
                                  <span 
                                    key={idx} 
                                    className={`px-2 py-0.5 rounded border transition-colors ${
                                      c.isHit 
                                        ? 'bg-red-500 text-white border-red-500 shadow-sm animate-pulse' 
                                        : 'bg-gray-50 text-gray-500 border-gray-200'
                                    }`}
                                  >
                                    {c.isHit ? '🎯 ' : ''}{c.text}
                                  </span>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })}
                      <div className="bg-gray-100/60 p-3 rounded-xl flex justify-between items-center font-bold text-xs">
                        <span className="text-gray-500">買い目合計:</span>
                        <span className="text-sm text-gray-800">{totalBetsAmount.toLocaleString()}円</span>
                      </div>
                    </div>
                  )}
                </div>

                {/* 3. 確定着順入力 (最下部へ配置) */}
                <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm">
                  <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-1.5">🏁 確定着順入力</h3>
                  <div className="space-y-2.5">
                    <div className="flex items-center gap-3">
                      <span className="w-10 text-xs text-gray-500 font-bold flex-shrink-0 text-right">1着:</span>
                      <select 
                        value={activeRace.result?.first || ''}
                        onChange={e => handleUpdateRaceResult(activeRace.id, 'first', e.target.value)}
                        className="flex-1 border border-gray-200 rounded-xl p-2 outline-none focus:border-green-600 bg-gray-50 font-bold text-gray-700 text-xs"
                      >
                        <option value="">未設定</option>
                        {Array.isArray(activeRace.horses) && [...activeRace.horses]
                          .filter(h => h.number)
                          .sort((a, b) => parseInt(a.number) - parseInt(b.number))
                          .map(h => (
                            <option key={h.id} value={h.number}>{h.number}番: {h.name}</option>
                          ))
                        }
                      </select>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="w-10 text-xs text-gray-500 font-bold flex-shrink-0 text-right">2着:</span>
                      <select 
                        value={activeRace.result?.second || ''}
                        onChange={e => handleUpdateRaceResult(activeRace.id, 'second', e.target.value)}
                        className="flex-1 border border-gray-200 rounded-xl p-2 outline-none focus:border-green-600 bg-gray-50 font-bold text-gray-700 text-xs"
                      >
                        <option value="">未設定</option>
                        {Array.isArray(activeRace.horses) && [...activeRace.horses]
                          .filter(h => h.number)
                          .sort((a, b) => parseInt(a.number) - parseInt(b.number))
                          .map(h => (
                            <option key={h.id} value={h.number}>{h.number}番: {h.name}</option>
                          ))
                        }
                      </select>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="w-10 text-xs text-gray-500 font-bold flex-shrink-0 text-right">3着:</span>
                      <select 
                        value={activeRace.result?.third || ''}
                        onChange={e => handleUpdateRaceResult(activeRace.id, 'third', e.target.value)}
                        className="flex-1 border border-gray-200 rounded-xl p-2 outline-none focus:border-green-600 bg-gray-50 font-bold text-gray-700 text-xs"
                      >
                        <option value="">未設定</option>
                        {Array.isArray(activeRace.horses) && [...activeRace.horses]
                          .filter(h => h.number)
                          .sort((a, b) => parseInt(a.number) - parseInt(b.number))
                          .map(h => (
                            <option key={h.id} value={h.number}>{h.number}番: {h.name}</option>
                          ))
                        }
                      </select>
                    </div>
                  </div>
                </div>

                {/* 4. レース収支入力 */}
                <div className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                  <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-1.5">📊 レース収支入力</h3>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-xs text-gray-400 font-bold block mb-1">購入金額 (円)</label>
                      <input 
                        type="number" 
                        inputMode="numeric"
                        pattern="[0-9]*"
                        value={activeRace.investment || ''} 
                        onChange={e => handleUpdateRaceBalance(activeRace.id, e.target.value, activeRace.payout || 0)} 
                        className="w-full border border-gray-200 rounded-xl p-2.5 outline-none focus:border-green-600 bg-white font-bold text-gray-700 text-sm"
                        placeholder="0"
                        min="0"
                        step="100"
                      />
                      {totalBetsAmount > 0 && (
                        <p className="text-[10px] text-gray-400 mt-1">※買い目合計: {totalBetsAmount.toLocaleString()}円</p>
                      )}
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 font-bold block mb-1">払戻金額 (円)</label>
                      <input 
                        type="number" 
                        inputMode="numeric"
                        pattern="[0-9]*"
                        value={activeRace.payout || ''} 
                        onChange={e => handleUpdateRaceBalance(activeRace.id, activeRace.investment || 0, e.target.value)} 
                        className="w-full border border-gray-200 rounded-xl p-2.5 outline-none focus:border-green-600 bg-white font-bold text-gray-700 text-sm"
                        placeholder="0"
                        min="0"
                        step="10"
                      />
                    </div>
                  </div>
                  <div className="mt-3 pt-3 border-t border-gray-200/60 flex justify-between items-center text-xs font-bold">
                    <span className="text-gray-500">このレースの収支:</span>
                    <span className={`text-base font-extrabold ${((activeRace.payout || 0) - (activeRace.investment || 0)) > 0 ? 'text-blue-600' : ((activeRace.payout || 0) - (activeRace.investment || 0)) < 0 ? 'text-red-500' : 'text-gray-600'}`}>
                      {((activeRace.payout || 0) - (activeRace.investment || 0)) > 0 ? '+' : ''}{((activeRace.payout || 0) - (activeRace.investment || 0)).toLocaleString()}円
                    </span>
                  </div>
                </div>

              </div>
            )}
          </div>
        </div>
      );
    }
    
    const fallbackUi = document.getElementById('fallback-ui');
    if (fallbackUi) fallbackUi.style.display = 'none';

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
