<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>競馬予想・ケシウマメモ</title>
  
  <!-- Tailwind CSS (デザイン用) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (ブラウザ内でReactコードを変換するため) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    /* iOSでの入力ズーム防止 */
    input, textarea, select { font-size: 16px !important; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 selection:bg-green-200 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Icons (SVG Components) ---
    const Plus = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const Trash2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const ChevronLeft = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const Flag = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>;
    const AlertTriangle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const FileText = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>;
    const XIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const Clipboard = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path></svg>;

    // --- Constants ---
    const MARKS = [
      { value: '-', label: '-', color: 'bg-gray-100 text-gray-400' },
      { value: '◎', label: '◎ (本命)', color: 'bg-red-100 text-red-600 font-bold border-red-200' },
      { value: '〇', label: '〇 (対抗)', color: 'bg-orange-100 text-orange-600 font-bold border-orange-200' },
      { value: '▲', label: '▲ (単穴)', color: 'bg-yellow-100 text-yellow-700 font-bold border-yellow-200' },
      { value: '△', label: '△ (連下)', color: 'bg-green-100 text-green-600 font-bold border-green-200' },
      { value: '☆', label: '☆ (注意)', color: 'bg-blue-100 text-blue-600 font-bold border-blue-200' },
      { value: '消', label: '消 (ケシ)', color: 'bg-gray-800 text-white font-bold border-gray-900' },
    ];

    const generateId = () => Date.now().toString() + Math.random().toString(36).substring(2, 9);

    function App() {
      // --- State ---
      const [races, setRaces] = useState(() => {
        try {
          const saved = localStorage.getItem('keiba-memo-races');
          if (saved) {
            const parsed = JSON.parse(saved);
            return Array.isArray(parsed) ? parsed : [];
          }
        } catch (e) { console.warn(e); }
        return [];
      });
      const [activeRaceId, setActiveRaceId] = useState(null);
      
      const [isAddingRace, setIsAddingRace] = useState(false);
      const [newRaceName, setNewRaceName] = useState('');
      const [newRaceDate, setNewRaceDate] = useState('');

      const [showImport, setShowImport] = useState(false);
      const [importText, setImportText] = useState('');

      // --- Effects ---
      useEffect(() => {
        try {
          localStorage.setItem('keiba-memo-races', JSON.stringify(races));
        } catch (error) { console.warn(error); }
      }, [races]);

      // --- Handlers ---
      const handleAddRace = (e) => {
        e.preventDefault();
        if (!newRaceName.trim()) return;

        let dateStr = newRaceDate;
        if (!dateStr) {
          const today = new Date();
          dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }

        const newRace = { id: generateId(), name: newRaceName, date: dateStr, memo: '', horses: [] };
        setRaces(prev => [newRace, ...(Array.isArray(prev) ? prev : [])]);
        setNewRaceName('');
        setNewRaceDate('');
        setIsAddingRace(false);
      };

      const handleDeleteRace = (id) => {
        if (window.confirm('このレースのメモを削除してもよろしいですか？')) {
          setRaces(races.filter(r => r.id !== id));
          if (activeRaceId === id) setActiveRaceId(null);
        }
      };

      const handleUpdateRaceMemo = (id, memo) => {
        setRaces(races.map(r => r.id === id ? { ...r, memo } : r));
      };

      const handleAddHorse = (raceId, horseNum, horseName) => {
        setRaces(races.map(r => {
          if (r.id === raceId) {
            const currentHorses = Array.isArray(r.horses) ? r.horses : [];
            return {
              ...r,
              horses: [...currentHorses, { id: generateId(), number: horseNum, name: horseName, mark: '-', memo: '' }]
                .sort((a, b) => (parseInt(a.number) || 999) - (parseInt(b.number) || 999))
            };
          }
          return r;
        }));
      };

      const handleUpdateHorse = (raceId, horseId, field, value) => {
        setRaces(races.map(r => {
          if (r.id === raceId) {
            return { ...r, horses: (r.horses || []).map(h => h.id === horseId ? { ...h, [field]: value } : h) };
          }
          return r;
        }));
      };

      const handleDeleteHorse = (raceId, horseId) => {
        setRaces(races.map(r => {
          if (r.id === raceId) {
            return { ...r, horses: (r.horses || []).filter(h => h.id !== horseId) };
          }
          return r;
        }));
      };

      const handleParseImport = () => {
        if (!importText.trim()) return;
        const lines = importText.split('\n');
        let newHorses = [];
        const activeRaceData = races.find(r => r.id === activeRaceId);
        if (!activeRaceData) return;
        const currentHorses = Array.isArray(activeRaceData.horses) ? activeRaceData.horses : [];

        lines.forEach(line => {
          const normalizedLine = line.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
          const nameMatch = normalizedLine.match(/[ァ-ヴー・]{2,10}/);
          if (nameMatch) {
            const name = nameMatch[0].trim();
            const nameIndex = normalizedLine.indexOf(name);
            const prefix = normalizedLine.substring(0, nameIndex);
            const nums = prefix.match(/\b([1-9]|[1-2][0-9]|30)\b/g); 
            let number = '';
            if (nums && nums.length > 0) number = nums[nums.length - 1]; 

            const isExist = currentHorses.some(h => h.name === name) || newHorses.some(h => h.name === name);
            if (!isExist && name.length >= 2) {
              newHorses.push({ id: generateId(), number: number, name: name, mark: '-', memo: '' });
            }
          }
        });

        if (newHorses.length > 0) {
          setRaces(races.map(r => {
            if (r.id === activeRaceId) {
              return { ...r, horses: [...(r.horses || []), ...newHorses].sort((a, b) => (parseInt(a.number)||999) - (parseInt(b.number)||999)) };
            }
            return r;
          }));
          alert(`${newHorses.length}頭の馬を追加しました！`);
        } else {
          alert('馬名が見つかりませんでした。テキストの形式を確認してください。');
        }
        setImportText('');
        setShowImport(false);
      };

      // --- Views ---
      const renderDashboard = () => (
        <div className="max-w-2xl mx-auto p-4 animate-fade-in">
          <div className="flex justify-between items-center mb-6 mt-4">
            <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
              <Flag className="text-green-600" size={24} /> 競馬予想メモ
            </h1>
            <button onClick={() => setIsAddingRace(true)} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-full shadow-sm flex items-center gap-1 transition-colors text-sm font-medium">
              <Plus size={18} /> レース追加
            </button>
          </div>

          {isAddingRace && (
            <form onSubmit={handleAddRace} className="bg-white p-4 rounded-xl shadow-md mb-6 border border-gray-100 relative">
              <button type="button" onClick={() => setIsAddingRace(false)} className="absolute top-3 right-3 text-gray-400 hover:text-gray-600"><XIcon size={20} /></button>
              <h2 className="text-lg font-semibold mb-3 text-gray-700">新規レース登録</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                  <label className="block text-xs text-gray-500 mb-1">レース名 (例: ダービー, 阪神11R)</label>
                  <input type="text" value={newRaceName} onChange={(e) => setNewRaceName(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="日本ダービー" autoFocus />
                </div>
                <div>
                  <label className="block text-xs text-gray-500 mb-1">日付</label>
                  <input type="date" value={newRaceDate} onChange={(e) => setNewRaceDate(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-green-500 outline-none" />
                </div>
              </div>
              <button type="submit" disabled={!newRaceName.trim()} className="w-full bg-gray-800 text-white rounded-lg p-2 font-medium disabled:opacity-50">登録する</button>
            </form>
          )}

          <div className="space-y-4">
            {races.length === 0 ? (
              <div className="text-center py-12 bg-white rounded-xl shadow-sm border border-gray-100 border-dashed">
                <AlertTriangle className="mx-auto text-gray-300 mb-3" size={48} />
                <p className="text-gray-500 font-medium">まだレースがありません</p>
                <p className="text-sm text-gray-400 mt-1">「レース追加」ボタンから予想を始めましょう</p>
              </div>
            ) : (
              races.map(race => {
                const horses = race.horses || [];
                const keshiCount = horses.filter(h => h.mark === '消').length;
                const honmei = horses.find(h => h.mark === '◎');

                return (
                  <div key={race.id} onClick={() => setActiveRaceId(race.id)} className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition-shadow cursor-pointer group">
                    <div className="flex justify-between items-start mb-2">
                      <div>
                        <span className="text-xs font-semibold text-green-600 bg-green-50 px-2 py-1 rounded-md mb-1 inline-block">{race.date}</span>
                        <h3 className="text-lg font-bold text-gray-800 group-hover:text-green-600 transition-colors">{race.name}</h3>
                      </div>
                      <button onClick={(e) => { e.stopPropagation(); handleDeleteRace(race.id); }} className="text-gray-300 hover:text-red-500 p-1"><Trash2 size={18} /></button>
                    </div>
                    <div className="flex flex-wrap gap-2 mt-3 text-sm">
                      {honmei && <span className="inline-flex items-center gap-1 bg-red-50 text-red-700 px-2 py-1 rounded-md text-xs font-medium border border-red-100">◎ {honmei.name}</span>}
                      {keshiCount > 0 && <span className="inline-flex items-center gap-1 bg-gray-100 text-gray-700 px-2 py-1 rounded-md text-xs font-medium border border-gray-200">消 {keshiCount}頭</span>}
                      <span className="inline-flex items-center gap-1 text-gray-500 px-2 py-1 text-xs"><FileText size={12} /> {horses.length}頭 登録</span>
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      );

      const renderRaceDetail = () => {
        const activeRace = races.find(r => r.id === activeRaceId);
        if (!activeRace) return null;

        const [newHorseNum, setNewHorseNum] = useState('');
        const [newHorseName, setNewHorseName] = useState('');
        const currentHorses = activeRace.horses || [];

        const handleHorseSubmit = (e) => {
          e.preventDefault();
          if (!newHorseName.trim()) return;
          handleAddHorse(activeRace.id, newHorseNum, newHorseName);
          setNewHorseNum('');
          setNewHorseName('');
        };

        return (
          <div className="max-w-3xl mx-auto p-4 animate-fade-in pb-20 mt-2">
            <div className="flex items-center gap-3 mb-4 bg-white p-3 rounded-xl shadow-sm sticky top-2 z-10 border border-gray-100">
              <button onClick={() => setActiveRaceId(null)} className="p-2 hover:bg-gray-100 rounded-full text-gray-600"><ChevronLeft size={24} /></button>
              <div className="flex-1">
                <p className="text-xs text-gray-500">{activeRace.date}</p>
                <h2 className="text-xl font-bold text-gray-800 leading-tight">{activeRace.name}</h2>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
              <label className="flex items-center gap-2 text-sm font-semibold text-gray-700 mb-2"><FileText size={16} className="text-green-600" />レース展開・馬場メモ</label>
              <textarea value={activeRace.memo} onChange={(e) => handleUpdateRaceMemo(activeRace.id, e.target.value)} placeholder="例: 内枠有利、ハイペース想定..." className="w-full border border-gray-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-green-500 outline-none resize-y min-h-[80px]" />
            </div>

            <div className="flex gap-2 mb-4">
              <button onClick={() => setShowImport(!showImport)} className="flex-1 bg-white border border-gray-300 text-gray-700 py-2 px-4 rounded-lg font-medium text-sm flex items-center justify-center gap-2 hover:bg-gray-50">
                <Clipboard size={18} /> 出馬表コピペで一括追加
              </button>
            </div>

            {showImport && (
              <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6 relative shadow-sm">
                <button onClick={() => setShowImport(false)} className="absolute top-2 right-2 text-blue-400 hover:text-blue-600 p-1"><XIcon size={18} /></button>
                <h4 className="text-sm font-bold text-blue-800 mb-2">ネットの出馬表をコピペしてください</h4>
                <p className="text-xs text-blue-600 mb-3">netkeibaやJRAの出馬表をテキストでコピーし、貼り付けると「馬番」と「馬名」を自動抽出します。</p>
                <textarea value={importText} onChange={(e) => setImportText(e.target.value)} placeholder="例:&#13;&#10;1 1 イクイノックス 牡4...&#13;&#10;2 2 ドウデュース 牡4..." className="w-full border border-blue-200 rounded-lg p-2 text-xs h-32 outline-none focus:ring-2 focus:ring-blue-500 mb-3" />
                <button onClick={handleParseImport} disabled={!importText.trim()} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg disabled:opacity-50">一括解析して登録</button>
              </div>
            )}

            <form onSubmit={handleHorseSubmit} className="bg-green-50 rounded-xl p-4 border border-green-100 shadow-sm mb-6">
              <h4 className="text-sm font-bold text-green-800 mb-3 flex items-center gap-1"><Plus size={16} /> 1頭ずつ手動で追加</h4>
              <div className="flex flex-wrap sm:flex-nowrap gap-2">
                <input type="number" value={newHorseNum} onChange={(e) => setNewHorseNum(e.target.value)} placeholder="馬番" className="w-20 border border-green-200 rounded-lg p-2 text-center outline-none focus:ring-2 focus:ring-green-500" min="1" max="18" />
                <input type="text" value={newHorseName} onChange={(e) => setNewHorseName(e.target.value)} placeholder="馬名を入力" className="flex-1 border border-green-200 rounded-lg p-2 outline-none focus:ring-2 focus:ring-green-500 min-w-[200px]" />
                <button type="submit" disabled={!newHorseName.trim()} className="bg-green-600 text-white px-4 py-2 rounded-lg disabled:opacity-50 w-full sm:w-auto">追加</button>
              </div>
            </form>

            <div className="space-y-3">
              <h3 className="text-sm font-semibold text-gray-700 flex items-center gap-2 px-1">出走馬・予想印<span className="bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-xs font-normal">{currentHorses.length}頭</span></h3>
              {currentHorses.length === 0 && !showImport && <div className="text-center py-8 bg-white rounded-xl shadow-sm border border-gray-100 border-dashed"><p className="text-gray-500 font-medium text-sm">馬が登録されていません</p></div>}
              {currentHorses.map(horse => {
                const markInfo = MARKS.find(m => m.value === horse.mark) || MARKS[0];
                const isKeshi = horse.mark === '消';
                return (
                  <div key={horse.id} className={`bg-white rounded-xl shadow-sm border p-3 sm:p-4 flex flex-col sm:flex-row gap-3 sm:items-start ${isKeshi ? 'border-gray-300 bg-gray-50 opacity-80' : 'border-gray-100 hover:border-green-200'}`}>
                    <div className="flex items-center gap-3 w-full sm:w-auto">
                      <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0 shadow-inner ${horse.number ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-400'}`}>{horse.number || '-'}</div>
                      <div className="relative shrink-0">
                        <select value={horse.mark} onChange={(e) => handleUpdateHorse(activeRace.id, horse.id, 'mark', e.target.value)} className={`appearance-none w-14 h-10 text-center rounded-lg font-bold text-lg cursor-pointer outline-none border ${markInfo.color}`}>
                          {MARKS.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
                        </select>
                      </div>
                      <div className="flex-1 font-bold text-lg text-gray-800 truncate"><span className={isKeshi ? 'line-through text-gray-500' : ''}>{horse.name}</span></div>
                      <button onClick={() => handleDeleteHorse(activeRace.id, horse.id)} className="text-gray-300 hover:text-red-500 p-2 sm:hidden rounded-md"><Trash2 size={18} /></button>
                    </div>
                    <div className="flex-1 w-full flex items-start gap-2">
                      <div className="flex-1 relative">
                        <input type="text" value={horse.memo} onChange={(e) => handleUpdateHorse(activeRace.id, horse.id, 'memo', e.target.value)} placeholder={isKeshi ? "ケシ理由 (例: 距離長い)" : "メモ"} className={`w-full text-sm border-b rounded-none px-2 py-1.5 focus:border-green-500 outline-none bg-transparent ${isKeshi ? 'border-gray-300 placeholder-gray-400 text-gray-700' : 'border-gray-200'}`} />
                      </div>
                      <button onClick={() => handleDeleteHorse(activeRace.id, horse.id)} className="text-gray-300 hover:text-red-500 p-2 hidden sm:block rounded-md"><Trash2 size={18} /></button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      return activeRaceId ? renderRaceDetail() : renderDashboard();
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
