<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ウマメモ">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f9fafb">
  
  <title>競馬予想・ウマメモ</title>
  
  <style>
    html, body {
      background-color: #f9fafb; color: #111827; margin: 0; padding: 0;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      -webkit-tap-highlight-color: transparent; min-height: 100vh;
    }
    input, textarea, select { font-size: 16px !important; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
    #fallback-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px; }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.1/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="fallback-ui">
    <h1 style="color: #16a34a; font-size: 24px; margin-bottom: 12px; font-weight: bold;">ウマメモ</h1>
    <p id="fallback-message" style="color: #6b7280; font-size: 14px; line-height: 1.6;">
      アプリを起動しています...🐎<br><br>
      <span style="font-size: 12px; opacity: 0.8;">※処理中は少し時間がかかります。<br>そのままお待ちください。</span>
    </p>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STORAGE_KEY = 'uma-memo-data-v1';
    const CONFIG_KEY = 'uma-memo-firebase-config';

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false }; }
      static getDerivedStateFromError(error) { return { hasError: true }; }
      handleReset = () => { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(CONFIG_KEY); window.location.reload(); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center bg-white">
              <h1 className="text-xl font-bold text-red-600 mb-4">エラーが発生しました</h1>
              <button onClick={this.handleReset} className="bg-gray-800 text-white px-6 py-3 rounded-xl font-bold">リセットして復旧する</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const Plus = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const Trash2 = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const ChevronLeft = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const Flag = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>;
    const CopyIcon = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const SettingsIcon = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
    const CloudIcon = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path></svg>;
    const GoogleIcon = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 48 48" className={className}><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.73 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>;

    const MARKS = [
      { value: '-', display: '-', label: '未設定', color: 'bg-gray-50 text-gray-300 border-gray-200' },
      { value: '◎', display: '◎', label: '◎ (本命)', color: 'bg-red-50 text-red-600 border-red-300' },
      { value: '〇', display: '〇', label: '〇 (対抗)', color: 'bg-orange-50 text-orange-600 border-orange-300' },
      { value: '▲', display: '▲', label: '▲ (単穴)', color: 'bg-yellow-50 text-yellow-600 border-yellow-400' },
      { value: '△', display: '△', label: '△ (連下)', color: 'bg-green-50 text-emerald-600 border-emerald-300' },
      { value: '☆', display: '☆', label: '☆ (注意)', color: 'bg-blue-50 text-blue-600 border-blue-300' },
      { value: '消', display: '消', label: '消 (ケシ)', color: 'bg-gray-700 text-white border-gray-800' },
    ];
    const MARK_ORDER = { '◎': 1, '〇': 2, '▲': 3, '△': 4, '☆': 5, '消': 6, '-': 7 };

    const generateId = () => Date.now().toString() + Math.random().toString(36).substring(2, 9);
    const getTodayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };

    function App() {
      useEffect(() => {
        const createTouchIcon = () => {
          const canvas = document.createElement('canvas'); canvas.width = 180; canvas.height = 180;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#16a34a'; ctx.fillRect(0, 0, 180, 180);
          ctx.fillStyle = 'white'; ctx.font = 'bold 100px "Hiragino Kaku Gothic ProN", sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('馬', 90, 95);
          const link = document.createElement('link'); link.rel = 'apple-touch-icon'; link.href = canvas.toDataURL('image/png');
          document.head.appendChild(link);
        };
        createTouchIcon();
      }, []);

      const [races, setRaces] = useState([]);
      const [loading, setLoading] = useState(true);
      const [isCloudMode, setIsCloudMode] = useState(false);
      const cloudModeRef = useRef(false);
      const cloudUserRef = useRef(null);

      const [activeRaceId, setActiveRaceId] = useState(null);
      const [isAddingRace, setIsAddingRace] = useState(false);
      const [newRaceName, setNewRaceName] = useState('');
      const [newRaceDate, setNewRaceDate] = useState(getTodayStr());
      const [newHorseNum, setNewHorseNum] = useState('');
      const [newHorseName, setNewHorseName] = useState('');
      const [importText, setImportText] = useState('');
      const [filter, setFilter] = useState('all');
      const [sortType, setSortType] = useState('number');
      const [copyStatus, setCopyStatus] = useState('');
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [configInput, setConfigInput] = useState(localStorage.getItem(CONFIG_KEY) || '');

      useEffect(() => {
        const savedConfig = localStorage.getItem(CONFIG_KEY);
        if (savedConfig) {
          initCloud(savedConfig);
        } else {
          const localData = localStorage.getItem(STORAGE_KEY);
          if (localData) { try { setRaces(JSON.parse(localData)); } catch(e){} }
          setLoading(false);
        }
      }, []);

      const initCloud = async (configStr) => {
        try {
          if (typeof firebase === 'undefined') throw new Error('Firebase is not loaded');
          const config = JSON.parse(configStr);
          if (!firebase.apps.length) firebase.initializeApp(config);
          const auth = firebase.auth();
          const db = firebase.firestore();
          
          // エラーが発生した場合に画面に詳細を表示する（原因特定のため）
          await auth.getRedirectResult().catch(e => {
            alert("【ログイン通信エラー】\n" + e.message + "\n\n通信がブロックされました。「キャッシュの完全修復」をお試しください。");
          });

          auth.onAuthStateChanged((user) => {
            if (user) {
              cloudModeRef.current = true;
              cloudUserRef.current = user;
              setIsCloudMode(true);

              db.collection('users').doc(user.uid).get().then((doc) => {
                let cloudRaces = [];
                if (doc.exists) { cloudRaces = doc.data().races || []; }
                
                const localData = localStorage.getItem(STORAGE_KEY);
                let localRaces = localData ? JSON.parse(localData) : [];
                
                let merged = false;
                if (localRaces.length > 0) {
                  const newRaces = localRaces.filter(lr => !cloudRaces.some(cr => cr.id === lr.id));
                  if (newRaces.length > 0) {
                    cloudRaces = [...newRaces, ...cloudRaces];
                    merged = true;
                  }
                }
                
                if (merged || !doc.exists) {
                  db.collection('users').doc(user.uid).set({ races: cloudRaces }).catch(e => console.error(e));
                }
                
                setRaces(cloudRaces);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudRaces));
                setLoading(false);
                
                db.collection('users').doc(user.uid).onSnapshot((snap) => {
                  if (snap.exists) {
                    const updatedRaces = snap.data().races || [];
                    setRaces(updatedRaces);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(updatedRaces));
                  }
                });
              }).catch((error) => {
                alert("データベースの読み込みに失敗しました。");
                setLoading(false);
              });
            } else {
              const localData = localStorage.getItem(STORAGE_KEY);
              if (localData) { try { setRaces(JSON.parse(localData)); } catch(e){} }
              setLoading(false);
              setIsCloudMode(false);
            }
          });
        } catch (e) {
          localStorage.removeItem(CONFIG_KEY);
          setLoading(false);
        }
      };

      const handleLoginClick = async () => {
        try {
          const config = JSON.parse(configInput);
          localStorage.setItem(CONFIG_KEY, configInput);
          if (!firebase.apps.length) firebase.initializeApp(config);
          
          const provider = new firebase.auth.GoogleAuthProvider();
          
          // 【変更点】リダイレクトを完全にやめ、すべて「ポップアップ方式」に統一しました。
          await firebase.auth().signInWithPopup(provider);
          window.location.reload();
          
        } catch (e) {
          alert("ログイン開始エラー: " + e.message);
        }
      };

      const handleDisconnect = async () => {
        if(window.confirm("連携を解除してローカル保存に戻りますか？\n※iPhoneアプリ版では、再ログイン時に不具合が起きやすいため非推奨です。")) {
          try { if(firebase.apps.length > 0) await firebase.auth().signOut(); } catch(e) {}
          localStorage.removeItem(CONFIG_KEY);
          window.location.reload();
        }
      };

      // 🌟 バグ修復用：Firebaseのゴミデータを「全て」強制削除する（アルティメット版） 🌟
      const handleFixLoginCache = () => {
        if(window.confirm("ログインシステムのキャッシュを「完全」にリセットしますか？\n※予想データは消えませんのでご安心ください。")) {
          try {
            // 1. IndexedDBの削除
            indexedDB.deleteDatabase('firebaseLocalStorageDb');
            // 2. セッションストレージ（リダイレクト時の一時データ）の削除
            sessionStorage.clear();
            // 3. ローカルストレージ内のFirebase関連のゴミだけを全削除
            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              if (key && key.startsWith('firebase:')) {
                keysToRemove.push(key);
              }
            }
            keysToRemove.forEach(k => localStorage.removeItem(k));
          } catch(e) { console.error(e); }
          
          localStorage.removeItem(CONFIG_KEY);
          alert("完全リセットが完了しました！\n\n【重要】この後、iPhoneの画面を上にスワイプしてアプリ（またはSafari）を「完全に終了（タスクキル）」させてから、もう一度開いてください。");
          window.location.reload();
        }
      };

      const updateRaces = (updater) => {
        setRaces(prev => {
          const newRaces = typeof updater === 'function' ? updater(prev) : updater;
          if (cloudModeRef.current && cloudUserRef.current) {
            firebase.firestore().collection('users').doc(cloudUserRef.current.uid).set({ races: newRaces }).catch(e => console.error(e));
          } else {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(newRaces));
          }
          return newRaces;
        });
      };

      const handleAddRace = (e) => { e.preventDefault(); if (!newRaceName.trim()) return; updateRaces(prev => [{ id: generateId(), name: newRaceName, date: newRaceDate || getTodayStr(), horses: [] }, ...(Array.isArray(prev) ? prev : [])]); setNewRaceName(''); setIsAddingRace(false); };
      const handleDeleteRace = (id) => { if (window.confirm('このレースを削除しますか？')) { updateRaces(prev => prev.filter(r => r.id !== id)); if (activeRaceId === id) setActiveRaceId(null); } };
      const handleAddHorse = (e) => { e.preventDefault(); if (!newHorseName.trim() || !activeRaceId) return; updateRaces(prev => prev.map(r => r.id === activeRaceId ? { ...r, horses: [...(r.horses||[]), { id: generateId(), number: newHorseNum, name: newHorseName, mark: '-' }] } : r)); setNewHorseNum(''); setNewHorseName(''); };
      const handleUpdateHorse = (raceId, horseId, field, value) => { updateRaces(prev => prev.map(r => r.id === raceId ? { ...r, horses: (r.horses||[]).map(h => h.id === horseId ? { ...h, [field]: value } : h) } : r)); };
      const handleDeleteHorse = (raceId, horseId) => { updateRaces(prev => prev.map(r => r.id === raceId ? { ...r, horses: (r.horses||[]).filter(h => h.id !== horseId) } : r)); };

      const handleParseImport = () => {
        if (!importText.trim() || !activeRaceId) return;
        let newHorsesList = []; const lines = importText.split('\n'); let pendingNumber = ''; 
        lines.forEach(line => {
          let normalizedLine = line.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).trim();
          if(!normalizedLine) return;
          if (normalizedLine.match(/\(\d{2}\.\d\)/) || normalizedLine.match(/[a-zA-Z]\./)) return; 
          const ignoreWords = ['ブリンカー', 'カクチ', 'カクガイ', 'マルガイ', 'マルチ', 'カク地', 'マル地', 'マル外', 'カク外'];
          ignoreWords.forEach(word => { normalizedLine = normalizedLine.replace(new RegExp(word, 'g'), '').trim(); });
          const nameMatch = normalizedLine.match(/([ァ-ヴー・]{2,9})/);
          if (nameMatch) {
            const name = nameMatch[1].trim();
            const prefix = normalizedLine.substring(0, normalizedLine.indexOf(name)).trim();
            let number = '';
            if (prefix) { const nums = prefix.match(/\b([1-9]|[1-2][0-9]|30)\b/g); if (nums && nums.length > 0) number = nums[nums.length - 1]; } 
            else if (pendingNumber) { number = pendingNumber; }
            newHorsesList.push({ id: generateId(), number, name, mark: '-' });
            pendingNumber = '';
          } else {
            const numOnlyMatch = normalizedLine.match(/^(\d+)$/);
            if(numOnlyMatch) pendingNumber = numOnlyMatch[1];
            else { const twoNumsMatch = normalizedLine.match(/(\d+)\s+(\d+)$/); if (twoNumsMatch) pendingNumber = twoNumsMatch[2]; }
          }
        });
        if (newHorsesList.length > 0) { updateRaces(prev => prev.map(r => { if (r.id === activeRaceId) { const horses = Array.isArray(r.horses) ? r.horses : []; const uniqueNew = newHorsesList.filter(nh => !horses.some(eh => eh.name === nh.name)); return { ...r, horses: [...horses, ...uniqueNew] }; } return r; })); }
        setImportText('');
      };

      const handleCopyResult = (race) => {
        const horses = Array.isArray(race.horses) ? race.horses : [];
        const markedHorses = horses.filter(h => h.mark !== '-' && h.mark !== '消').sort((a, b) => MARK_ORDER[a.mark] - MARK_ORDER[b.mark]);
        if (markedHorses.length === 0) { alert('予想印(◎〜☆)がついていません！'); return; }
        let text = `🎫 ${race.name}\n`; markedHorses.forEach(h => { text += `${h.mark} ${h.number ? h.number+'番 ' : ''}${h.name}\n`; });
        const textArea = document.createElement("textarea"); textArea.value = text; textArea.style.position = "absolute"; textArea.style.left = "-999999px";
        document.body.appendChild(textArea); textArea.select();
        try { document.execCommand('copy'); setCopyStatus('コピー完了！'); setTimeout(() => setCopyStatus(''), 2000); } catch (err) { alert('コピーに失敗しました'); }
        document.body.removeChild(textArea);
      };

      if (loading) return null;

      const renderSettings = () => (
        <div className="fixed inset-0 bg-black/50 flex items-start justify-center z-50 p-4 pt-16 animate-fade-in">
          <div className="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl flex flex-col max-h-[80vh]">
            <h3 className="text-lg font-bold mb-4 flex items-center gap-2 flex-shrink-0"><CloudIcon className="text-blue-500" /> データ同期設定</h3>
            
            <div className="flex-1 overflow-y-auto pr-2 -mr-2 pb-2">
              {isCloudMode ? (
                <div>
                  <div className="bg-blue-50 text-blue-900 p-4 rounded-xl mb-4 border border-blue-100 flex items-center gap-3 shadow-sm">
                    <div className="bg-white p-2 rounded-full"><GoogleIcon size={24} /></div>
                    <div>
                      <p className="text-sm font-bold mb-0.5">Googleアカウントで同期中</p>
                      <p className="text-xs opacity-70 truncate max-w-[200px]">{cloudUserRef.current?.displayName || cloudUserRef.current?.email || 'ログイン済み'}</p>
                    </div>
                  </div>
                  <button onClick={handleDisconnect} className="w-full bg-red-50 text-red-600 font-bold py-3 rounded-xl hover:bg-red-100 mb-2">連携を解除する</button>
                  <p className="text-[10px] text-gray-500 leading-tight">※iPhoneアプリ版では、一度解除すると再ログイン時に不具合が起きやすいため、頻繁なログアウトは非推奨です。</p>
                </div>
              ) : (
                <div>
                  <p className="text-xs text-gray-600 mb-3 leading-relaxed">Firebaseの設定(JSON)を貼り付けると、Googleアカウントでのログイン画面が開き、データをクラウドに保存できます。</p>
                  <textarea value={configInput} onChange={e => setConfigInput(e.target.value)} placeholder='{"apiKey": "AIzaSy...", "authDomain": "...", ...}' className="w-full border border-gray-200 rounded-xl p-3 text-xs h-32 outline-none focus:border-green-600 bg-gray-50 mb-4 font-mono shadow-inner" />
                  <button onClick={handleLoginClick} disabled={!configInput.trim()} className="w-full flex items-center justify-center gap-2 bg-blue-600 text-white font-bold py-3 rounded-xl mb-2 disabled:opacity-50 hover:bg-blue-700"><GoogleIcon size={20} className="bg-white rounded-full p-0.5"/> Googleでログインして同期</button>
                  
                  <div className="mt-6 pt-4 border-t border-gray-100">
                    <p className="text-[10px] text-gray-500 mb-2 font-bold">🛠️ トラブルシューティング</p>
                    <p className="text-[10px] text-gray-400 mb-2 leading-tight">何度ログインしても同期されない場合、iPhone内にゴミデータが残って通信をブロックしています。</p>
                    <button onClick={handleFixLoginCache} className="w-full bg-gray-100 text-gray-600 text-xs font-bold py-2 rounded-lg hover:bg-gray-200 mt-1">
                      ログインキャッシュを完全修復する
                    </button>
                  </div>
                </div>
              )}
            </div>
            
            <button onClick={() => setIsSettingsOpen(false)} className="w-full text-gray-500 font-bold py-3 mt-4 hover:bg-gray-50 rounded-xl border border-transparent flex-shrink-0">閉じる</button>
          </div>
        </div>
      );

      if (!activeRaceId) {
        const safeRaces = Array.isArray(races) ? races : [];
        return (
          <div className="max-w-xl mx-auto p-4 animate-fade-in pt-safe pb-safe">
            {isSettingsOpen && renderSettings()}
            <div className="flex justify-between items-center mb-8 mt-2 md:mt-4">
              <h1 className="text-xl font-bold tracking-tight text-green-800 flex items-center gap-2"><Flag className="text-green-600" /> ウマメモ{isCloudMode && <CloudIcon className="text-blue-500" size={18} />}</h1>
              <div className="flex gap-2">
                <button onClick={() => setIsSettingsOpen(true)} className="p-2 text-gray-400 hover:text-gray-600 rounded-full bg-white shadow-sm border border-gray-100"><SettingsIcon size={18} /></button>
                <button onClick={() => setIsAddingRace(true)} className="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-full shadow-sm flex items-center gap-1 text-sm font-medium"><Plus size={16} /> 追加</button>
              </div>
            </div>

            {isAddingRace && (
              <form onSubmit={handleAddRace} className="bg-white p-5 rounded-2xl shadow border border-green-100 mb-6 animate-fade-in">
                <div className="flex justify-between items-center mb-4"><h2 className="text-base font-bold text-gray-800">新規レース</h2><button type="button" onClick={() => setIsAddingRace(false)} className="text-gray-400">キャンセル</button></div>
                <div className="space-y-4 mb-5">
                  <input type="text" value={newRaceName} onChange={e => setNewRaceName(e.target.value)} className="w-full border-b border-gray-200 py-2 outline-none focus:border-green-600 bg-transparent text-gray-800" placeholder="レース名 (例: ダービー)" autoFocus />
                  <input type="date" value={newRaceDate} onChange={e => setNewRaceDate(e.target.value)} className="w-full border-b border-gray-200 py-2 outline-none focus:border-green-600 bg-transparent text-gray-600" />
                </div>
                <button type="submit" disabled={!newRaceName.trim()} className="w-full bg-green-600 text-white rounded-xl py-3 font-bold disabled:opacity-30">追加する</button>
              </form>
            )}

            <div className="space-y-3">
              {safeRaces.length === 0 ? (
                <div className="text-center py-16 bg-white rounded-2xl border border-gray-100 border-dashed"><p className="text-gray-400 font-medium text-sm">レースが登録されていません</p></div>
              ) : (
                safeRaces.map(race => {
                  const horses = Array.isArray(race.horses) ? race.horses : [];
                  const markedCount = horses.filter(h => h.mark !== '-' && h.mark !== '消').length;
                  const keshiCount = horses.filter(h => h.mark === '消').length;
                  return (
                    <div key={race.id} onClick={() => setActiveRaceId(race.id)} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 hover:shadow-md cursor-pointer transition-shadow">
                      <div className="flex justify-between items-start mb-2">
                        <div><p className="text-xs font-bold text-green-600 tracking-wider mb-1 bg-green-50 inline-block px-2 py-0.5 rounded">{race.date}</p><h3 className="text-lg font-bold text-gray-900">{race.name}</h3></div>
                        <button onClick={(e) => { e.stopPropagation(); handleDeleteRace(race.id); }} className="text-gray-300 hover:text-red-500 p-2 -mr-2 -mt-2 rounded-full"><Trash2 size={16} /></button>
                      </div>
                      <div className="flex flex-wrap gap-2 mt-3 text-xs font-medium">
                        <span className="bg-gray-100 text-gray-600 px-2 py-1 rounded-md">{horses.length}頭</span>
                        {markedCount > 0 && <span className="bg-red-50 text-red-600 border border-red-100 px-2 py-1 rounded-md">予想 {markedCount}頭</span>}
                        {keshiCount > 0 && <span className="bg-gray-800 text-white px-2 py-1 rounded-md">消 {keshiCount}頭</span>}
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>
        );
      }

      const activeRace = Array.isArray(races) ? races.find(r => r.id === activeRaceId) : null;
      if (!activeRace) { setActiveRaceId(null); return null; }
      const currentHorses = Array.isArray(activeRace.horses) ? activeRace.horses : [];
      let filteredAndSorted = currentHorses.filter(horse => { if (filter === 'all') return true; if (filter === 'marked') return ['◎', '〇', '▲', '△', '☆'].includes(horse.mark); if (filter === 'keshi') return horse.mark === '消'; return true; });
      filteredAndSorted.sort((a, b) => { if (sortType === 'number') return (parseInt(a.number)||999) - (parseInt(b.number)||999); const markDiff = MARK_ORDER[a.mark] - MARK_ORDER[b.mark]; if (markDiff !== 0) return markDiff; return (parseInt(a.number)||999) - (parseInt(b.number)||999); });

      return (
        <div className="max-w-xl mx-auto animate-fade-in bg-white min-h-screen pb-32">
          <div className="sticky top-0 z-20 bg-white/90 backdrop-blur border-b border-gray-100 px-4 py-3 flex items-center justify-between pt-safe">
            <button onClick={() => {setActiveRaceId(null); setFilter('all'); setSortType('number');}} className="p-2 -ml-2 text-gray-600 hover:bg-gray-100 rounded-full"><ChevronLeft size={24} /></button>
            <div className="flex-1 text-center"><h2 className="text-base font-bold text-gray-900 truncate px-2">{activeRace.name}</h2></div>
            <button onClick={() => handleCopyResult(activeRace)} className="p-2 -mr-2 text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-full relative group"><CopyIcon size={20} />{copyStatus && <span className="absolute top-10 right-0 bg-gray-800 text-white text-xs px-2 py-1 rounded shadow whitespace-nowrap">{copyStatus}</span>}</button>
          </div>

          <div className="p-4">
            <div className="mb-6">
               <textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder="出馬表をコピペして一括追加..." className="w-full border border-gray-200 rounded-xl p-3 text-sm h-14 outline-none focus:border-blue-400 focus:h-32 transition-all duration-200 bg-gray-50" />
               {importText.trim() && <button onClick={handleParseImport} className="mt-2 w-full bg-blue-600 text-white font-bold py-2 rounded-xl text-sm animate-fade-in">解析して追加</button>}
            </div>

            <div className="flex flex-wrap items-center justify-between gap-2 mb-4 bg-gray-50 p-1.5 rounded-xl border border-gray-100">
              <div className="flex gap-1 text-xs font-bold">
                <button onClick={() => setFilter('all')} className={`px-3 py-2 rounded-lg transition-colors ${filter === 'all' ? 'bg-white shadow-sm text-gray-900 border border-gray-200' : 'text-gray-500'}`}>全頭</button>
                <button onClick={() => setFilter('marked')} className={`px-3 py-2 rounded-lg transition-colors ${filter === 'marked' ? 'bg-white shadow-sm text-gray-900 border border-gray-200' : 'text-gray-500'}`}>印のみ</button>
                <button onClick={() => setFilter('keshi')} className={`px-3 py-2 rounded-lg transition-colors ${filter === 'keshi' ? 'bg-white shadow-sm text-gray-900 border border-gray-200' : 'text-gray-500'}`}>消のみ</button>
              </div>
              <div className="flex gap-1 text-xs font-bold bg-gray-200/50 p-1 rounded-lg">
                <button onClick={() => setSortType('number')} className={`px-2 py-1 rounded transition-colors ${sortType === 'number' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500'}`}>馬番順</button>
                <button onClick={() => setSortType('mark')} className={`px-2 py-1 rounded transition-colors ${sortType === 'mark' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500'}`}>印順</button>
              </div>
            </div>

            <div className="border border-gray-200 rounded-2xl overflow-hidden shadow-sm bg-white">
              {filteredAndSorted.length === 0 ? (
                <div className="p-8 text-center text-sm text-gray-400">表示する馬がいません</div>
              ) : (
                filteredAndSorted.map((horse, idx) => {
                  const markInfo = MARKS.find(m => m.value === horse.mark) || MARKS[0];
                  const isKeshi = horse.mark === '消';
                  const isLast = idx === filteredAndSorted.length - 1;
                  return (
                    <div key={horse.id} className={`flex items-center p-3 sm:p-4 gap-3 transition-colors ${!isLast ? 'border-b border-gray-100' : ''} ${isKeshi ? 'bg-gray-100' : 'hover:bg-gray-50'}`}>
                      <div className={`w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-lg text-sm font-bold ${horse.number ? 'bg-slate-200 text-slate-700' : 'bg-transparent text-transparent'}`}>{horse.number || '-'}</div>
                      <div className="relative w-12 h-10 flex-shrink-0">
                        <div className={`absolute inset-0 flex items-center justify-center rounded-xl font-bold text-base border-2 ${markInfo.color} pointer-events-none`}>{markInfo.display}</div>
                        <select value={horse.mark} onChange={e => handleUpdateHorse(activeRace.id, horse.id, 'mark', e.target.value)} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer">{MARKS.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}</select>
                      </div>
                      <div className="flex-1 min-w-0"><h4 className={`font-bold text-[16px] truncate ${isKeshi ? 'text-gray-400 line-through' : 'text-gray-900'}`}>{horse.name}</h4></div>
                      <button onClick={() => handleDeleteHorse(activeRace.id, horse.id)} className="text-gray-300 hover:text-red-500 p-2 flex-shrink-0 transition-colors"><Trash2 size={16} /></button>
                    </div>
                  );
                })
              )}
            </div>

            <form onSubmit={handleAddHorse} className="mt-6 flex gap-2">
              <input type="number" value={newHorseNum} onChange={e => setNewHorseNum(e.target.value)} placeholder="番" className="w-16 border border-gray-200 rounded-xl p-2 text-center text-sm outline-none focus:border-green-600 bg-gray-50" min="1" max="18" />
              <input type="text" value={newHorseName} onChange={e => setNewHorseName(e.target.value)} placeholder="馬名を手動追加" className="flex-1 border border-gray-200 rounded-xl p-2 text-sm outline-none focus:border-green-600 bg-gray-50" />
              <button type="submit" disabled={!newHorseName.trim()} className="bg-gray-800 text-white px-4 rounded-xl disabled:opacity-50 text-sm font-bold"><Plus size={16}/></button>
            </form>
          </div>
        </div>
      );
    }
    
    const fallbackUi = document.getElementById('fallback-ui');
    if (fallbackUi) fallbackUi.style.display = 'none';

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
