<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>競馬予想・ケシウマメモ</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (バージョンを固定して安定化) -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.23.1/babel.min.js"></script>

  <style>
    body { 
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }
    input, textarea, select { font-size: 16px !important; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- エラーで真っ白になるのを防ぐ保護機能 (Error Boundary) ---
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true };
      }
      handleReset = () => {
        // 過去の破損データをすべて削除して初期化
        localStorage.removeItem('keiba-app-v3');
        localStorage.removeItem('keiba-app-v2');
        localStorage.removeItem('keiba-memo-races');
        window.location.reload();
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center">
              <h1 className="text-2xl font-bold text-red-600 mb-4">エラーが発生しました</h1>
              <p className="text-gray-600 mb-8 text-sm">古いデータが破損しているか、読み込みに失敗しました。</p>
              <button onClick={this.handleReset} className="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg font-bold shadow-md transition-colors">
                データをリセットして直す
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // --- 外部通信不要のSVGアイコン群 ---
    const Plus = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const Trash2 = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const ChevronLeft = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const Flag = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>;
    const AlertTriangle = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const FileText = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>;
    const XIcon = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const ClipboardList = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><path d="M12 11h4"></path><path d="M12 16h4"></path><path d="M8 11h.01"></path><path d="M8 16h.01"></path></svg>;

    // --- 定数・ユーティリティ ---
    const MARKS = [
      { value: '-', label: '-', color: 'bg-gray-100 text-gray-400' },
      { value: '◎', label: '◎ (本命)', color: 'bg-red-100 text-red-600 font-bold border-red-200' },
      { value: '〇', label: '〇 (対抗)', color: 'bg-orange-100 text-orange-600 font-bold border-orange-200' },
      { value: '▲', label: '▲ (単穴)', color: 'bg-yellow-100 text-yellow-700 font-bold border-yellow-200' },
      { value: '△', label: '△ (連下)', color: 'bg-green-100 text-green-600 font-bold border-green-200' },
      { value: '☆', label: '☆ (注意)', color: 'bg-blue-100 text-blue-600 font-bold border-blue-200' },
      { value: '消', label: '消 (ケシ)', color: 'bg-gray-800 text-white font-bold border-gray-900' },
    ];
    const generateId = () => Date.now().toString() + Math.random().toString(36).substring(2, 9);
    const getTodayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    // --- メインアプリ ---
    function App() {
      // データの読み込み (新しい保存先キー v3 を使用)
      const [races, setRaces] = useState(() => {
        try {
          const saved = localStorage.getItem('keiba-app-v3');
          if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) return parsed;
          }
        } catch (e) {
          console.error(e);
        }
        return [];
      });

      const [activeRaceId, setActiveRaceId] = useState(null);
      const [isAddingRace, setIsAddingRace] = useState(false);
      const [newRaceName, setNewRaceName] = useState('');
      const [newRaceDate, setNewRaceDate] = useState(getTodayStr());

      const [newHorseNum, setNewHorseNum] = useState('');
      const [newHorseName, setNewHorseName] = useState('');

      const [showImport, setShowImport] = useState(false);
      const [importText, setImportText] = useState('');

      // データの保存
      useEffect(() => {
        try {
          localStorage.setItem('keiba-app-v3', JSON.stringify(Array.isArray(races) ? races : []));
        } catch (e) {
          console.error(e);
        }
      }, [races]);

      // --- ハンドラー ---
      const handleAddRace = (e) => {
        e.preventDefault();
        if (!newRaceName.trim()) return;
        const newRace = { id: generateId(), name: newRaceName, date: newRaceDate || getTodayStr(), memo: '', horses: [] };
        setRaces(prev => [newRace, ...(Array.isArray(prev) ? prev : [])]);
        setNewRaceName('');
        setIsAddingRace(false);
      };

      const handleDeleteRace = (id) => {
        if (window.confirm('このレースを削除しますか？')) {
          setRaces(prev => prev.filter(r => r.id !== id));
          if (activeRaceId === id) setActiveRaceId(null);
        }
      };

      const handleUpdateRaceMemo = (id, memo) => {
        setRaces(prev => prev.map(r => r.id === id ? { ...r, memo } : r));
      };

      const handleAddHorse = (e) => {
        e.preventDefault();
        if (!newHorseName.trim() || !activeRaceId) return;

        setRaces(prev => {
          if (!Array.isArray(prev)) return [];
          return prev.map(r => {
            if (r.id === activeRaceId) {
              const horses = Array.isArray(r.horses) ? r.horses : [];
              const newHorse = { id: generateId(), number: newHorseNum, name: newHorseName, mark: '-', memo: '' };
              const merged = [...horses, newHorse].sort((a, b) => (parseInt(a.number)||999) - (parseInt(b.number)||999));
              return { ...r, horses: merged };
            }
            return r;
          });
        });
        setNewHorseNum('');
        setNewHorseName('');
      };

      const handleUpdateHorse = (raceId, horseId, field, value) => {
        setRaces(prev => prev.map(r => {
          if (r.id === raceId) {
            const horses = Array.isArray(r.horses) ? r.horses : [];
            return { ...r, horses: horses.map(h => h.id === horseId ? { ...h, [field]: value } : h) };
          }
          return r;
        }));
      };

      const handleDeleteHorse = (raceId, horseId) => {
        setRaces(prev => prev.map(r => {
          if (r.id === raceId) {
            const horses = Array.isArray(r.horses) ? r.horses : [];
            return { ...r, horses: horses.filter(h => h.id !== horseId) };
          }
          return r;
        }));
      };

      const handleParseImport = () => {
        if (!importText.trim() || !activeRaceId) return;
        const lines = importText.split('\n');
        let newHorsesList = [];

        lines.forEach(line => {
          const normalizedLine = line.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
          const nameMatch = normalizedLine.match(/[ァ-ヴー・]{2,10}/);
          if (nameMatch) {
            const name = nameMatch[0].trim();
            const prefix = normalizedLine.substring(0, normalizedLine.indexOf(name));
            const nums = prefix.match(/\b([1-9]|[1-2][0-9]|30)\b/g); 
            let number = '';
            if (nums && nums.length > 0) number = nums[nums.length - 1]; 
            if (name.length >= 2) newHorsesList.push({ id: generateId(), number, name, mark: '-', memo: '' });
          }
        });

        if (newHorsesList.length > 0) {
          setRaces(prev => prev.map(r => {
            if (r.id === activeRaceId) {
              const horses = Array.isArray(r.horses) ? r.horses : [];
              const uniqueNew = newHorsesList.filter(nh => !horses.some(eh => eh.name === nh.name));
              const merged = [...horses, ...uniqueNew].sort((a, b) => (parseInt(a.number)||999) - (parseInt(b.number)||999));
              return { ...r, horses: merged };
            }
            return r;
          }));
          alert(`${newHorsesList.length}頭の馬を追加しました！`);
        } else {
          alert('馬名が見つかりませんでした。');
        }
        setImportText('');
        setShowImport(false);
      };

      // --- 画面描画 ---
      if (!activeRaceId) {
        const safeRaces = Array.isArray(races) ? races : [];
        return (
          <div className="max-w-2xl mx-auto p-4 animate-fade-in">
            <div className="flex justify-between items-center mb-6 mt-2">
              <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <Flag className="text-green-600" /> 競馬予想メモ
              </h1>
              <button onClick={() => setIsAddingRace(true)} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-full shadow-sm flex items-center gap-1 text-sm font-medium">
                <Plus size={18} /> レース追加
              </button>
            </div>

            {isAddingRace && (
              <form onSubmit={handleAddRace} className="bg-white p-4 rounded-xl shadow-md mb-6 border border-gray-100 relative animate-fade-in">
                <button type="button" onClick={() => setIsAddingRace(false)} className="absolute top-3 right-3 text-gray-400 p-1"><XIcon size={20} /></button>
                <h2 className="text-lg font-semibold mb-3">新規レース登録</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">レース名</label>
                    <input type="text" value={newRaceName} onChange={e => setNewRaceName(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2 outline-none focus:ring-2 focus:ring-green-500" placeholder="日本ダービー" autoFocus />
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">日付</label>
                    <input type="date" value={newRaceDate} onChange={e => setNewRaceDate(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2 outline-none focus:ring-2 focus:ring-green-500" />
                  </div>
                </div>
                <button type="submit" disabled={!newRaceName.trim()} className="w-full bg-gray-800 text-white rounded-lg p-2 font-medium disabled:opacity-50">登録する</button>
              </form>
            )}

            <div className="space-y-4">
              {safeRaces.length === 0 ? (
                <div className="text-center py-12 bg-white rounded-xl shadow-sm border border-gray-100 border-dashed">
                  <div className="flex justify-center mb-3 text-gray-300"><AlertTriangle size={48} /></div>
                  <p className="text-gray-500 font-medium">まだレースがありません</p>
                </div>
              ) : (
                safeRaces.map(race => {
                  const horses = Array.isArray(race.horses) ? race.horses : [];
                  const keshiCount = horses.filter(h => h.mark === '消').length;
                  const honmei = horses.find(h => h.mark === '◎');

                  return (
                    <div key={race.id} onClick={() => setActiveRaceId(race.id)} className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md cursor-pointer group">
                      <div className="flex justify-between items-start mb-2">
                        <div>
                          <span className="text-xs font-semibold text-green-600 bg-green-50 px-2 py-1 rounded-md mb-1 inline-block">{race.date}</span>
                          <h3 className="text-lg font-bold text-gray-800">{race.name}</h3>
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); handleDeleteRace(race.id); }} className="text-gray-300 hover:text-red-500 p-1"><Trash2 size={18} /></button>
                      </div>
                      <div className="flex flex-wrap gap-2 mt-3 text-sm">
                        {honmei && <span className="inline-flex items-center gap-1 bg-red-50 text-red-700 px-2 py-1 rounded-md text-xs font-medium border border-red-100">◎ {honmei.name}</span>}
                        {keshiCount > 0 && <span className="inline-flex items-center gap-1 bg-gray-100 text-gray-700 px-2 py-1 rounded-md text-xs font-medium border border-gray-200">消 {keshiCount}頭</span>}
                        <span className="inline-flex items-center gap-1 text-gray-500 px-2 py-1 text-xs"><FileText size={12} /> {horses.length}頭 登録</span>
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>
        );
      }

      const activeRace = Array.isArray(races) ? races.find(r => r.id === activeRaceId) : null;
      if (!activeRace) {
        setActiveRaceId(null);
        return null;
      }
      const currentHorses = Array.isArray(activeRace.horses) ? activeRace.horses : [];

      return (
        <div className="max-w-3xl mx-auto p-4 animate-fade-in pb-24 mt-2">
          <div className="flex items-center gap-3 mb-4 bg-white p-3 rounded-xl shadow-sm sticky top-2 z-10 border border-gray-100">
            <button onClick={() => setActiveRaceId(null)} className="p-2 hover:bg-gray-100 rounded-full text-gray-600"><ChevronLeft size={24} /></button>
            <div className="flex-1">
              <p className="text-xs text-gray-500">{activeRace.date}</p>
              <h2 className="text-xl font-bold text-gray-800 leading-tight">{activeRace.name}</h2>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
            <label className="flex items-center gap-2 text-sm font-semibold text-gray-700 mb-2"><FileText size={16} className="text-green-600" />レース・馬場メモ</label>
            <textarea value={activeRace.memo || ''} onChange={e => handleUpdateRaceMemo(activeRace.id, e.target.value)} placeholder="例: 内枠有利..." className="w-full border border-gray-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-green-500 outline-none resize-y min-h-[80px]" />
          </div>

          <div className="flex gap-2 mb-4">
            <button onClick={() => setShowImport(!showImport)} className="flex-1 bg-white border border-gray-300 text-gray-700 py-2 px-4 rounded-lg font-medium text-sm flex items-center justify-center gap-2 hover:bg-gray-50">
              <ClipboardList size={18} /> 出馬表コピペで一括追加
            </button>
          </div>

          {showImport && (
            <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6 relative shadow-sm animate-fade-in">
              <button onClick={() => setShowImport(false)} className="absolute top-2 right-2 text-blue-400 p-1"><XIcon size={18} /></button>
              <h4 className="text-sm font-bold text-blue-800 mb-2">ネットの出馬表をコピペ</h4>
              <textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder="テキストを貼り付け" className="w-full border border-blue-200 rounded-lg p-2 text-xs h-32 outline-none focus:ring-2 focus:ring-blue-500 mb-3" />
              <button onClick={handleParseImport} disabled={!importText.trim()} className="w-full bg-blue-600 text-white font-medium py-2 rounded-lg disabled:opacity-50">一括解析して登録</button>
            </div>
          )}

          <form onSubmit={handleAddHorse} className="bg-green-50 rounded-xl p-4 border border-green-100 shadow-sm mb-6">
            <h4 className="text-sm font-bold text-green-800 mb-3 flex items-center gap-1"><Plus size={16} /> 1頭ずつ手動で追加</h4>
            <div className="flex flex-wrap sm:flex-nowrap gap-2">
              <input type="number" value={newHorseNum} onChange={e => setNewHorseNum(e.target.value)} placeholder="馬番" className="w-20 border border-green-200 rounded-lg p-2 text-center outline-none bg-white" min="1" max="18" />
              <input type="text" value={newHorseName} onChange={e => setNewHorseName(e.target.value)} placeholder="馬名を入力" className="flex-1 border border-green-200 rounded-lg p-2 outline-none bg-white min-w-[150px]" />
              <button type="submit" disabled={!newHorseName.trim()} className="bg-green-600 text-white px-4 py-2 rounded-lg disabled:opacity-50 font-medium w-full sm:w-auto">追加</button>
            </div>
          </form>

          <div className="space-y-3">
            <h3 className="text-sm font-semibold text-gray-700 flex items-center gap-2 px-1">出走馬・予想印<span className="bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full text-xs font-normal">{currentHorses.length}頭</span></h3>
            {currentHorses.map(horse => {
              const markInfo = MARKS.find(m => m.value === horse.mark) || MARKS[0];
              const isKeshi = horse.mark === '消';
              return (
                <div key={horse.id} className={`bg-white rounded-xl shadow-sm border p-3 sm:p-4 flex flex-col sm:flex-row gap-3 sm:items-center ${isKeshi ? 'border-gray-300 bg-gray-50 opacity-80' : 'border-gray-100 hover:border-green-200'}`}>
                  <div className="flex items-center gap-3 w-full sm:w-auto">
                    <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0 shadow-inner ${horse.number ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-400'}`}>{horse.number || '-'}</div>
                    <div className="relative shrink-0">
                      <select value={horse.mark} onChange={e => handleUpdateHorse(activeRace.id, horse.id, 'mark', e.target.value)} className={`appearance-none w-14 h-10 text-center rounded-lg font-bold text-lg outline-none border ${markInfo.color}`}>
                        {MARKS.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
                      </select>
                    </div>
                    <div className="flex-1 font-bold text-lg text-gray-800 truncate min-w-[120px]"><span className={isKeshi ? 'line-through text-gray-500' : ''}>{horse.name}</span></div>
                    <button onClick={() => handleDeleteHorse(activeRace.id, horse.id)} className="text-gray-300 hover:text-red-500 p-2 sm:hidden"><Trash2 size={18} /></button>
                  </div>
                  <div className="flex-1 w-full flex items-center gap-2 mt-2 sm:mt-0">
                    <div className="flex-1 relative">
                      <input type="text" value={horse.memo || ''} onChange={e => handleUpdateHorse(activeRace.id, horse.id, 'memo', e.target.value)} placeholder={isKeshi ? "ケシ理由" : "メモ"} className={`w-full text-sm border-b rounded-none px-2 py-1.5 outline-none bg-transparent ${isKeshi ? 'border-gray-300 text-gray-700' : 'border-gray-200'}`} />
                    </div>
                    <button onClick={() => handleDeleteHorse(activeRace.id, horse.id)} className="text-gray-300 hover:text-red-500 p-2 hidden sm:block"><Trash2 size={18} /></button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    // ErrorBoundaryでラップしてアプリを起動
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
