<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ウマメモ">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f9fafb">
  
  <title>競馬予想・ウマメモ</title>
  
  <style>
    html, body {
      background-color: #f9fafb; color: #111827; margin: 0; padding: 0;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      -webkit-tap-highlight-color: transparent; min-height: 100vh;
    }
    input, textarea, select { font-size: 16px !important; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
    #fallback-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 20px; }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.1/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="fallback-ui">
    <h1 style="color: #16a34a; font-size: 24px; margin-bottom: 12px; font-weight: bold;">ウマメモ</h1>
    <p id="fallback-message" style="color: #6b7280; font-size: 14px; line-height: 1.6;">
      アプリを起動しています...🐎<br><br>
      <span style="font-size: 12px; opacity: 0.8;">※処理中は少し時間がかかります。<br>そのままお待ちください。</span>
    </p>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const STORAGE_KEY = 'uma-memo-data-v1';
    const CONFIG_KEY = 'uma-memo-firebase-config';

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false }; }
      static getDerivedStateFromError(error) { return { hasError: true }; }
      handleReset = () => { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(CONFIG_KEY); window.location.reload(); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center bg-white">
              <h1 className="text-xl font-bold text-red-600 mb-4">エラーが発生しました</h1>
              <button onClick={this.handleReset} className="bg-gray-800 text-white px-6 py-3 rounded-xl font-bold">リセットして復旧する</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const Plus = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const Trash2 = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const ChevronLeft = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const ChevronRight = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
    const Award = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>;
    const Flag = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>;
    const CopyIcon = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const SettingsIcon = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
    const CloudIcon = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path></svg>;
    const GoogleIcon = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 48 48" className={className}><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.73 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>;
    const BookOpen = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
    const TrendingUp = ({ size=20, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>;

    const MARKS = [
      { value: '-', display: '-', label: '未設定', color: 'bg-gray-50 text-gray-300 border-gray-200' },
      { value: '◎', display: '◎', label: '◎ (本命)', color: 'bg-red-50 text-red-600 border-red-300' },
      { value: '〇', display: '〇', label: '〇 (対抗)', color: 'bg-orange-50 text-orange-600 border-orange-300' },
      { value: '▲', display: '▲', label: '▲ (単穴)', color: 'bg-yellow-50 text-yellow-600 border-yellow-400' },
      { value: '△', display: '△', label: '△ (連下)', color: 'bg-green-50 text-emerald-600 border-emerald-300' },
      { value: '☆', display: '☆', label: '☆ (注意)', color: 'bg-blue-50 text-blue-600 border-blue-300' },
      { value: '消', display: '消', label: '消 (ケシ)', color: 'bg-gray-700 text-white border-gray-800' },
    ];
    const MARK_ORDER = { '◎': 1, '〇': 2, '▲': 3, '△': 4, '☆': 5, '消': 6, '-': 7 };

    const getBetCombinationCount = (type, method, sel1 = [], sel2 = [], sel3 = [], nagashiAnchorCount = 1, isMulti = false) => {
      if (type === '単勝' || type === '複勝') {
        return sel1.length;
      }

      if (method === 'box') {
        const n = sel1.length;
        if (type === '馬連' || type === 'ワイド' || type === '枠連') {
          return n >= 2 ? (n * (n - 1)) / 2 : 0;
        }
        if (type === '馬単') {
          return n >= 2 ? n * (n - 1) : 0;
        }
        if (type === '3連複') {
          return n >= 3 ? (n * (n - 1) * (n - 2)) / 6 : 0;
        }
        if (type === '3連単') {
          return n >= 3 ? n * (n - 1) * (n - 2) : 0;
        }
        return 0;
      }

      if (method === 'formation' || method === 'normal') {
        const s1 = sel1;
        const s2 = sel2;
        const s3 = sel3;

        if (type === '馬連' || type === 'ワイド') {
          const checked = new Set();
          for (let a of s1) {
            for (let b of s2) {
              if (a === b) continue;
              const key = [a, b].sort((x, y) => x.localeCompare(y)).join('-');
              checked.add(key);
            }
          }
          return checked.size;
        }

        if (type === '枠連') {
          const checked = new Set();
          for (let a of s1) {
            for (let b of s2) {
              const key = [a, b].sort((x, y) => x.localeCompare(y)).join('-');
              checked.add(key);
            }
          }
          return checked.size;
        }

        if (type === '馬単') {
          const checked = new Set();
          for (let a of s1) {
            for (let b of s2) {
              if (a === b) continue;
              const key = `${a}-${b}`;
              checked.add(key);
            }
          }
          return checked.size;
        }

        if (type === '3連複') {
          const checked = new Set();
          for (let a of s1) {
            for (let b of s2) {
              if (a === b) continue;
              for (let c of s3) {
                if (a === c || b === c) continue;
                const key = [a, b, c].sort((x, y) => x.localeCompare(y)).join('-');
                checked.add(key);
              }
            }
          }
          return checked.size;
        }

        if (type === '3連単') {
          const checked = new Set();
          for (let a of s1) {
            for (let b of s2) {
              if (a === b) continue;
              for (let c of s3) {
                if (a === c || b === c) continue;
                const key = `${a}-${b}-${c}`;
                checked.add(key);
              }
            }
          }
          return checked.size;
        }
      }

      if (method === 'nagashi') {
        const s1 = sel1;
        const s2 = sel2;
        const s3 = sel3;

        if (type === '馬連' || type === 'ワイド' || type === '枠連' || type === '馬単') {
          const anchor = s1[0];
          if (!anchor) return 0;
          let count = 0;
          s2.forEach(partner => {
            if (partner === anchor) return;
            count++;
          });
          if (type === '馬単' && isMulti) return count * 2;
          return count;
        }

        if (type === '3連複') {
          if (nagashiAnchorCount === 1) {
            const anchor = s1[0];
            if (!anchor) return 0;
            const partners = s2.filter(h => h !== anchor);
            const n = partners.length;
            return n >= 2 ? (n * (n - 1)) / 2 : 0;
          } else {
            const anchor1 = s1[0];
            const anchor2 = s2[0];
            if (!anchor1 || !anchor2 || anchor1 === anchor2) return 0;
            const partners = s3.filter(h => h !== anchor1 && h !== anchor2);
            return partners.length;
          }
        }

        if (type === '3連単') {
          if (nagashiAnchorCount === 1) {
            const anchor = s1[0];
            if (!anchor) return 0;
            const partners = s2.filter(h => h !== anchor);
            const n = partners.length;
            if (n < 2) return 0;
            return isMulti ? n * (n - 1) * 3 : n * (n - 1);
          } else {
            const anchor1 = s1[0];
            const anchor2 = s2[0];
            if (!anchor1 || !anchor2 || anchor1 === anchor2) return 0;
            const partners = s3.filter(h => h !== anchor1 && h !== anchor2);
            const n = partners.length;
            if (n < 1) return 0;
            return isMulti ? n * 6 : n * 2;
          }
        }
      }

      return 0;
    };

    const normalizeHorses = (horses) => {
      if (!horses) return [[], [], []];
      if (typeof horses === 'object' && !Array.isArray(horses)) {
        return [
          Array.isArray(horses.sel1) ? horses.sel1 : [],
          Array.isArray(horses.sel2) ? horses.sel2 : [],
          Array.isArray(horses.sel3) ? horses.sel3 : []
        ];
      }
      if (Array.isArray(horses) && Array.isArray(horses[0])) {
        return [
          Array.isArray(horses[0]) ? horses[0] : [],
          Array.isArray(horses[1]) ? horses[1] : [],
          Array.isArray(horses[2]) ? horses[2] : []
        ];
      }
      if (Array.isArray(horses)) {
        return [horses, [], []];
      }
      return [[], [], []];
    };

    const ensureRaceSchema = (raceList) => {
      if (!Array.isArray(raceList)) return [];
      return raceList.map(r => {
        if (!r || typeof r !== 'object') return r;
        return {
          ...r,
          horses: Array.isArray(r.horses) ? r.horses.map(h => ({
            ...h,
            mark: h.mark || '-',
            number: h.number || ''
          })) : [],
          bets: Array.isArray(r.bets) ? r.bets.map(b => {
            if (!b || typeof b !== 'object') return b;
            const combCount = (typeof b.combinationCount === 'number' && !isNaN(b.combinationCount)) ? b.combinationCount : 1;
            const amt = (typeof b.amountPerBet === 'number' && !isNaN(b.amountPerBet)) ? b.amountPerBet : 0;
            const totalAmt = (typeof b.totalAmount === 'number' && b.totalAmount !== null && !isNaN(b.totalAmount)) ? b.totalAmount : (combCount * amt);
            return {
              ...b,
              type: b.type || '単勝',
              method: b.method || 'normal',
              horses: b.horses || { sel1: [], sel2: [], sel3: [] },
              amountPerBet: amt,
              combinationCount: combCount,
              totalAmount: totalAmt,
              multi: typeof b.multi === 'boolean' ? b.multi : false,
              anchorCount: typeof b.anchorCount === 'number' ? b.anchorCount : 1
            };
          }) : [],
          result: r.result && typeof r.result === 'object' ? {
            first: r.result.first || '',
            second: r.result.second || '',
            third: r.result.third || ''
          } : { first: '', second: '', third: '' },
          investment: typeof r.investment === 'number' ? r.investment : 0,
          payout: typeof r.payout === 'number' ? r.payout : 0
        };
      });
    };

    const generateId = () => Date.now().toString() + Math.random().toString(36).substring(2, 9);
    const getTodayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };

    function App() {
      useEffect(() => {
        const createTouchIcon = () => {
          const canvas = document.createElement('canvas'); canvas.width = 180; canvas.height = 180;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#16a34a'; ctx.fillRect(0, 0, 180, 180);
          ctx.fillStyle = 'white'; ctx.font = 'bold 100px "Hiragino Kaku Gothic ProN", sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('馬', 90, 95);
          const link = document.createElement('link'); link.rel = 'apple-touch-icon'; link.href = canvas.toDataURL('image/png');
          document.head.appendChild(link);
        };
        createTouchIcon();
      }, []);

      const [races, setRaces] = useState([]);
      const [loading, setLoading] = useState(true);
      const [isCloudMode, setIsCloudMode] = useState(false);
      const cloudModeRef = useRef(false);
      const cloudUserRef = useRef(null);

      const [currentTab, setCurrentTab] = useState('memo'); // 'memo' or 'balance'
      const [raceSortOption, setRaceSortOption] = useState('date-desc'); // date-desc, date-asc, name-asc, balance-desc
      const [raceDetailTab, setRaceDetailTab] = useState('predict'); // 'predict' or 'bets'
      const [balanceSortOption, setBalanceSortOption] = useState('asc'); // 'asc' (oldest first) or 'desc' (newest first)

      const [activeRaceId, setActiveRaceId] = useState(null);
      const [isAddingRace, setIsAddingRace] = useState(false);
      const [newRaceName, setNewRaceName] = useState('');
      const [newRaceDate, setNewRaceDate] = useState(getTodayStr());
      const [newHorseNum, setNewHorseNum] = useState('');
      const [newHorseName, setNewHorseName] = useState('');
      const [importText, setImportText] = useState('');
      const [filter, setFilter] = useState('all');
      const [sortType, setSortType] = useState('number');
      const [copyStatus, setCopyStatus] = useState('');
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [configInput, setConfigInput] = useState(localStorage.getItem(CONFIG_KEY) || '');
      const [importBalanceText, setImportBalanceText] = useState('');

      const [betType, setBetType] = useState('単勝');
      const [betMethod, setBetMethod] = useState('normal'); // 'normal', 'box', 'formation', 'nagashi'
      const [betSel1, setBetSel1] = useState([]);
      const [betSel2, setBetSel2] = useState([]);
      const [betSel3, setBetSel3] = useState([]);
      const [betAmountPerBet, setBetAmountPerBet] = useState(100);
      const [betNagashiAnchorCount, setBetNagashiAnchorCount] = useState(1); // 1 or 2
      const [betMulti, setBetMulti] = useState(false);

      useEffect(() => {
        setBetSel1([]);
        setBetSel2([]);
        setBetSel3([]);
        setBetNagashiAnchorCount(1);
        setBetMulti(false);
      }, [betType, betMethod]);

      useEffect(() => {
        const savedConfig = localStorage.getItem(CONFIG_KEY);
        if (savedConfig) {
          initCloud(savedConfig);
        } else {
          const localData = localStorage.getItem(STORAGE_KEY);
          if (localData) { try { setRaces(ensureRaceSchema(JSON.parse(localData))); } catch(e){} }
          setLoading(false);
        }
      }, []);

      const initCloud = async (configStr) => {
        try {
          if (typeof firebase === 'undefined') throw new Error('Firebase is not loaded');
          const config = JSON.parse(configStr);
          if (!firebase.apps.length) firebase.initializeApp(config);
          const auth = firebase.auth();
          const db = firebase.firestore();

          auth.onAuthStateChanged((user) => {
            if (user) {
              cloudModeRef.current = true;
              cloudUserRef.current = user;
              setIsCloudMode(true);

              db.collection('users').doc(user.uid).get().then((doc) => {
                let cloudRaces = [];
                if (doc.exists) { cloudRaces = doc.data().races || []; }
                
                const localData = localStorage.getItem(STORAGE_KEY);
                let localRaces = localData ? JSON.parse(localData) : [];
                
                let merged = false;
                if (localRaces.length > 0) {
                  const newRaces = localRaces.filter(lr => !cloudRaces.some(cr => cr.id === lr.id));
                  if (newRaces.length > 0) {
                    cloudRaces = [...newRaces, ...cloudRaces];
                    merged = true;
                  }
                }
                
                const verifiedRaces = ensureRaceSchema(cloudRaces);
                
                if (merged || !doc.exists) {
                  const cleanCloudRaces = JSON.parse(JSON.stringify(verifiedRaces));
                  db.collection('users').doc(user.uid).set({ races: cleanCloudRaces }).catch(e => console.error(e));
                }
                
                setRaces(verifiedRaces);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(verifiedRaces));
                setLoading(false);
                
                db.collection('users').doc(user.uid).onSnapshot((snap) => {
                  if (snap.exists) {
                    const updatedRaces = snap.data().races || [];
                    const verifiedUpdated = ensureRaceSchema(updatedRaces);
                    setRaces(verifiedUpdated);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(verifiedUpdated));
                  }
                });
              }).catch((error) => {
                console.error("Firestore get() error:", error);
                // オフライン状態等でDB取得に失敗した場合でも、ローカルキャッシュを読み込んでアプリの起動を妨げない
                const localData = localStorage.getItem(STORAGE_KEY);
                if (localData) { try { setRaces(ensureRaceSchema(JSON.parse(localData))); } catch(e){} }
                setLoading(false);
                
                // 一時的な接続エラー(offlineやunavailable)以外の場合のみ警告を表示する
                if (error.code !== 'unavailable' && error.message.indexOf('offline') === -1) {
                  alert("データベースの読み込みに失敗しました。\n詳細: " + error.message);
                }
              });
            } else {
              const localData = localStorage.getItem(STORAGE_KEY);
              if (localData) { try { setRaces(ensureRaceSchema(JSON.parse(localData))); } catch(e){} }
              setLoading(false);
              setIsCloudMode(false);
            }
          });
        } catch (e) {
          localStorage.removeItem(CONFIG_KEY);
          setLoading(false);
        }
      };

      const handleLoginClick = async () => {
        try {
          const config = JSON.parse(configInput);
          localStorage.setItem(CONFIG_KEY, configInput);
          if (!firebase.apps.length) firebase.initializeApp(config);
          
          const provider = new firebase.auth.GoogleAuthProvider();
          
          await firebase.auth().signInWithPopup(provider);
          window.location.reload();
          
        } catch (e) {
          if (e.code !== 'auth/cancelled-popup-request') {
            alert("ログイン開始エラー: " + e.message);
          }
        }
      };

      const handleDisconnect = async () => {
        if(window.confirm("連携を解除してローカル保存に戻りますか？\n※iPhoneアプリ版では、再ログイン時に不具合が起きやすいため非推奨です。")) {
          try { if(firebase.apps.length > 0) await firebase.auth().signOut(); } catch(e) {}
          localStorage.removeItem(CONFIG_KEY);
          window.location.reload();
        }
      };

      // 🌟 バグ修復用：Firebaseのゴミデータを「全て」強制削除する（アルティメット版） 🌟
      const handleFixLoginCache = () => {
        if(window.confirm("ログインシステムのキャッシュを「完全」にリセットしますか？\n※予想データは消えませんのでご安心ください。")) {
          try {
            // 1. IndexedDBの削除
            indexedDB.deleteDatabase('firebaseLocalStorageDb');
            // 2. セッションストレージ（リダイレクト時の一時データ）の削除
            sessionStorage.clear();
            // 3. ローカルストレージ内のFirebase関連のゴミだけを全削除
            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              if (key && key.startsWith('firebase:')) {
                keysToRemove.push(key);
              }
            }
            keysToRemove.forEach(k => localStorage.removeItem(k));
          } catch(e) { console.error(e); }
          
          localStorage.removeItem(CONFIG_KEY);
          alert("完全リセットが完了しました！\n\n【重要】この後、iPhoneの画面を上にスワイプしてアプリ（またはSafari）を「完全に終了（タスクキル）」させてから、もう一度開いてください。");
          window.location.reload();
        }
      };

      const updateRaces = (updater) => {
        setRaces(prev => {
          const rawRaces = typeof updater === 'function' ? updater(prev) : updater;
          const verifiedRaces = ensureRaceSchema(rawRaces);
          const cleanRaces = JSON.parse(JSON.stringify(verifiedRaces));
          if (cloudModeRef.current && cloudUserRef.current) {
            firebase.firestore().collection('users').doc(cloudUserRef.current.uid).set({ races: cleanRaces }).catch(e => console.error(e));
          } else {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cleanRaces));
          }
          return cleanRaces;
        });
      };

      const handleAddRace = (e) => { e.preventDefault(); if (!newRaceName.trim()) return; updateRaces(prev => [{ id: generateId(), name: newRaceName, date: newRaceDate || getTodayStr(), horses: [] }, ...(Array.isArray(prev) ? prev : [])]); setNewRaceName(''); setIsAddingRace(false); };
      const handleDeleteRace = (id) => { if (window.confirm('このレースを削除しますか？')) { updateRaces(prev => prev.filter(r => r.id !== id)); if (activeRaceId === id) setActiveRaceId(null); } };
      const handleUpdateRaceBalance = (raceId, investment, payout) => {
        updateRaces(prev => prev.map(r => r.id === raceId ? { ...r, investment: parseInt(investment) || 0, payout: parseInt(payout) || 0 } : r));
      };

      const handleAddBet = (raceId, e) => {
        if (e) e.preventDefault();
        const count = getBetCombinationCount(betType, betMethod, betSel1, betSel2, betSel3, betNagashiAnchorCount, betMulti);
        if (count <= 0) {
          alert('買い目が1点以上になるように選択してください。');
          return;
        }
        const amount = parseInt(betAmountPerBet) || 0;
        const totalAmount = count * amount;
        const newBet = {
          id: generateId(),
          type: betType,
          method: betMethod,
          horses: { sel1: [...betSel1], sel2: [...betSel2], sel3: [...betSel3] },
          amountPerBet: amount,
          combinationCount: count,
          totalAmount: totalAmount,
          multi: betMulti,
          anchorCount: betNagashiAnchorCount
        };

        updateRaces(prev => prev.map(r => {
          if (r.id === raceId) {
            const currentBets = Array.isArray(r.bets) ? r.bets : [];
            const newBets = [...currentBets, newBet];
            const newInvestment = newBets.reduce((sum, b) => sum + (b.totalAmount || 0), 0);
            return {
              ...r,
              bets: newBets,
              investment: newInvestment
            };
          }
          return r;
        }));

        setBetSel1([]);
        setBetSel2([]);
        setBetSel3([]);
      };

      const handleDeleteBet = (raceId, betId) => {
        if (window.confirm('この買い目を削除しますか？')) {
          updateRaces(prev => prev.map(r => {
            if (r.id === raceId) {
              const currentBets = Array.isArray(r.bets) ? r.bets : [];
              const newBets = currentBets.filter(b => b.id !== betId);
              const newInvestment = newBets.reduce((sum, b) => sum + (b.totalAmount || 0), 0);
              return {
                ...r,
                bets: newBets,
                investment: newInvestment
              };
            }
            return r;
          }));
        }
      };

      const handleAddHorse = (e) => { e.preventDefault(); if (!newHorseName.trim() || !activeRaceId) return; updateRaces(prev => prev.map(r => r.id === activeRaceId ? { ...r, horses: [...(r.horses||[]), { id: generateId(), number: newHorseNum, name: newHorseName, mark: '-' }] } : r)); setNewHorseNum(''); setNewHorseName(''); };
      const handleUpdateHorse = (raceId, horseId, field, value) => { updateRaces(prev => prev.map(r => r.id === raceId ? { ...r, horses: (r.horses||[]).map(h => h.id === horseId ? { ...h, [field]: value } : h) } : r)); };
      const handleDeleteHorse = (raceId, horseId) => { updateRaces(prev => prev.map(r => r.id === raceId ? { ...r, horses: (r.horses||[]).filter(h => h.id !== horseId) } : r)); };

      const handleToggleBetHit = (raceId, betId) => {
        updateRaces(prev => prev.map(r => {
          if (r.id === raceId) {
            const bets = Array.isArray(r.bets) ? r.bets : [];
            const updatedBets = bets.map(b => b.id === betId ? { ...b, isHit: !b.isHit } : b);
            return { ...r, bets: updatedBets };
          }
          return r;
        }));
      };

      const handleUpdateRaceResult = (raceId, rank, horseNumber) => {
        updateRaces(prev => prev.map(r => {
          if (r.id === raceId) {
            const result = r.result || { first: '', second: '', third: '' };
            return { ...r, result: { ...result, [rank]: horseNumber } };
          }
          return r;
        }));
      };

      const handleParseImport = () => {
        if (!importText.trim() || !activeRaceId) return;
        let newHorsesList = []; const lines = importText.split('\n'); let pendingNumber = ''; 
        lines.forEach(line => {
          let normalizedLine = line.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).trim();
          if(!normalizedLine) return;
          if (normalizedLine.match(/\(\d{2}\.\d\)/) || normalizedLine.match(/[a-zA-Z]\./)) return; 
          const ignoreWords = ['ブリンカー', 'カクチ', 'カクガイ', 'マルガイ', 'マルチ', 'カク地', 'マル地', 'マル外', 'カク外'];
          ignoreWords.forEach(word => { normalizedLine = normalizedLine.replace(new RegExp(word, 'g'), '').trim(); });
          const nameMatch = normalizedLine.match(/([ァ-ヴー・]{2,9})/);
          if (nameMatch) {
            const name = nameMatch[1].trim();
            const prefix = normalizedLine.substring(0, normalizedLine.indexOf(name)).trim();
            let number = '';
            if (prefix) { const nums = prefix.match(/\b([1-9]|[1-2][0-9]|30)\b/g); if (nums && nums.length > 0) number = nums[nums.length - 1]; } 
            else if (pendingNumber) { number = pendingNumber; }
            newHorsesList.push({ id: generateId(), number, name, mark: '-' });
            pendingNumber = '';
          } else {
            const numOnlyMatch = normalizedLine.match(/^(\d+)$/);
            if(numOnlyMatch) pendingNumber = numOnlyMatch[1];
            else { const twoNumsMatch = normalizedLine.match(/(\d+)\s+(\d+)$/); if (twoNumsMatch) pendingNumber = twoNumsMatch[2]; }
          }
        });
        if (newHorsesList.length > 0) { updateRaces(prev => prev.map(r => { if (r.id === activeRaceId) { const horses = Array.isArray(r.horses) ? r.horses : []; const uniqueNew = newHorsesList.filter(nh => !horses.some(eh => eh.name === nh.name)); return { ...r, horses: [...horses, ...uniqueNew] }; } return r; })); }
        setImportText('');
      };

      const handleImportBalance = () => {
        if (!importBalanceText.trim()) return;
        const lines = importBalanceText.split('\n');
        const importedRaces = [];
        
        lines.forEach(line => {
          const row = line.trim();
          if (!row) return;
          
          const parts = row.split(/\t|\s{2,}/);
          if (parts.length < 2) return;
          
          let dateStr = parts[0].trim();
          let nameStr = parts[1].trim();
          let investStr = parts[2] ? parts[2].trim() : '0';
          let payoutStr = parts[3] ? parts[3].trim() : '0';
          
          dateStr = dateStr.replace(/\//g, '-');
          if (dateStr.match(/^\d{2}-\d{2}-\d{2}$/)) {
            dateStr = '20' + dateStr;
          }
          if (!dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) {
            dateStr = getTodayStr();
          }
          
          const investment = parseInt(investStr.replace(/,/g, '').replace(/円/g, '')) || 0;
          const payout = parseInt(payoutStr.replace(/,/g, '').replace(/円/g, '')) || 0;
          
          importedRaces.push({
            id: generateId(),
            name: nameStr,
            date: dateStr,
            horses: [],
            bets: [],
            result: { first: '', second: '', third: '' },
            investment: investment,
            payout: payout
          });
        });
        
        if (importedRaces.length > 0) {
          updateRaces(prev => [...importedRaces, ...(Array.isArray(prev) ? prev : [])]);
          alert(`${importedRaces.length}件の過去収支をインポートしました！`);
          setImportBalanceText('');
          setIsSettingsOpen(false);
        } else {
          alert("インポート可能なデータが解析できませんでした。\nスプレッドシートから [日付, レース名, 購入額, 払戻額] の列範囲をコピペしてください。");
        }
      };

      const handleCopyResult = (race) => {
        const horses = Array.isArray(race.horses) ? race.horses : [];
        const markedHorses = horses.filter(h => h.mark !== '-' && h.mark !== '消').sort((a, b) => MARK_ORDER[a.mark] - MARK_ORDER[b.mark]);
        if (markedHorses.length === 0) { alert('予想印(◎〜☆)がついていません！'); return; }
        let text = `🎫 ${race.name}\n`; markedHorses.forEach(h => { text += `${h.mark} ${h.number ? h.number+'番 ' : ''}${h.name}\n`; });
        const textArea = document.createElement("textarea"); textArea.value = text; textArea.style.position = "absolute"; textArea.style.left = "-999999px";
        document.body.appendChild(textArea); textArea.select();
        try { document.execCommand('copy'); setCopyStatus('コピー完了！'); setTimeout(() => setCopyStatus(''), 2000); } catch (err) { alert('コピーに失敗しました'); }
        document.body.removeChild(textArea);
      };

      if (loading) return null;

      const renderSettings = () => (
        <div className="fixed inset-0 bg-black/50 flex items-start justify-center z-50 p-4 pt-16 animate-fade-in">
          <div className="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl flex flex-col max-h-[80vh]">
            <h3 className="text-lg font-bold mb-4 flex items-center gap-2 flex-shrink-0"><CloudIcon className="text-blue-500" /> データ同期設定</h3>
            
            <div className="flex-1 overflow-y-auto pr-2 -mr-2 pb-2">
              {isCloudMode ? (
                <div>
                  <div className="bg-blue-50 text-blue-900 p-4 rounded-xl mb-4 border border-blue-100 flex items-center gap-3 shadow-sm">
                    <div className="bg-white p-2 rounded-full"><GoogleIcon size={24} /></div>
                    <div>
                      <p className="text-sm font-bold mb-0.5">Googleアカウントで同期中</p>
                      <p className="text-xs opacity-70 truncate max-w-[200px]">{cloudUserRef.current?.displayName || cloudUserRef.current?.email || 'ログイン済み'}</p>
                    </div>
                  </div>
                  <button onClick={handleDisconnect} className="w-full bg-red-50 text-red-600 font-bold py-3 rounded-xl hover:bg-red-100 mb-2">連携を解除する</button>
                  <p className="text-[10px] text-gray-500 leading-tight">※iPhoneアプリ版では、一度解除すると再ログイン時に不具合が起きやすいため、頻繁なログアウトは非推奨です。</p>
                </div>
              ) : (
                <div>
                  <p className="text-xs text-gray-600 mb-3 leading-relaxed">Firebaseの設定(JSON)を貼り付けると、Googleアカウントでのログイン画面が開き、データをクラウドに保存できます。</p>
                  <textarea value={configInput} onChange={e => setConfigInput(e.target.value)} placeholder='{"apiKey": "AIzaSy...", "authDomain": "...", ...}' className="w-full border border-gray-200 rounded-xl p-3 text-xs h-32 outline-none focus:border-green-600 bg-gray-50 mb-4 font-mono shadow-inner" />
                  <button onClick={handleLoginClick} disabled={!configInput.trim()} className="w-full flex items-center justify-center gap-2 bg-blue-600 text-white font-bold py-3 rounded-xl mb-2 disabled:opacity-50 hover:bg-blue-700"><GoogleIcon size={20} className="bg-white rounded-full p-0.5"/> Googleでログインして同期</button>
                  
                  <div className="mt-6 pt-4 border-t border-gray-100">
                    <p className="text-[10px] text-gray-500 mb-2 font-bold">🛠️ トラブルシューティング</p>
                    <p className="text-[10px] text-gray-400 mb-2 leading-tight">何度ログインしても同期されない場合、iPhone内にゴミデータが残って通信をブロックしています。</p>
                    <button onClick={handleFixLoginCache} className="w-full bg-gray-100 text-gray-600 text-xs font-bold py-2 rounded-lg hover:bg-gray-200 mt-1">
                      ログインキャッシュを完全修復する
                    </button>
                  </div>
                </div>
              )}

              {/* 過去の収支データ一括取り込み */}
              <div className="mt-6 pt-4 border-t border-gray-100">
                <p className="text-xs font-bold text-gray-800 mb-1 flex items-center gap-1.5">📊 過去収支の一括取り込み</p>
                <p className="text-[10px] text-gray-400 mb-2 leading-tight">
                  スプレッドシートから [日付, レース名, 購入額, 払戻額] の列範囲をコピペし、以下に貼り付けて取り込みボタンを押してください。
                </p>
                <textarea 
                  value={importBalanceText} 
                  onChange={e => setImportBalanceText(e.target.value)} 
                  placeholder={"2026/07/19\t函館2歳S\t1000\t2500\n2026/07/18\t函館記念\t500\t0"}
                  className="w-full border border-gray-200 rounded-xl p-2.5 text-[11px] h-20 outline-none focus:border-green-600 bg-gray-50 mb-2 shadow-inner font-mono whitespace-pre" 
                />
                {importBalanceText.trim() && (
                  <button 
                    onClick={handleImportBalance} 
                    className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-xl text-xs shadow transition-colors animate-fade-in"
                  >
                    収支データを取り込む
                  </button>
                )}
              </div>
            </div>
            
            <button onClick={() => setIsSettingsOpen(false)} className="w-full text-gray-500 font-bold py-3 mt-4 hover:bg-gray-50 rounded-xl border border-transparent flex-shrink-0">閉じる</button>
          </div>
        </div>
      );

      if (!activeRaceId) {
        // 累積収支を計算するために、全レースを日付の古い順にソートしたコピーを作る
        const sortedForBalance = Array.isArray(races) ? [...races] : [];
        sortedForBalance.sort((a, b) => a.date.localeCompare(b.date) || a.name.localeCompare(b.name, 'ja'));

        let cumulative = 0;
        const balanceData = sortedForBalance.map(race => {
          const investment = race.investment || 0;
          const payout = race.payout || 0;
          const balance = payout - investment;
          cumulative += balance;
          return {
            id: race.id,
            date: race.date.replace(/-/g, '/'),
            name: race.name,
            investment,
            payout,
            balance,
            cumulative
          };
        });

        const displayedBalanceData = balanceSortOption === 'desc' 
          ? [...balanceData].reverse() 
          : balanceData;

        const totalInvestment = balanceData.reduce((sum, d) => sum + d.investment, 0);
        const totalPayout = balanceData.reduce((sum, d) => sum + d.payout, 0);
        const netBalance = totalPayout - totalInvestment;
        const recoveryRate = totalInvestment > 0 ? ((totalPayout / totalInvestment) * 100).toFixed(1) : '0.0';

        const safeRaces = Array.isArray(races) ? [...races] : [];
        safeRaces.sort((a, b) => {
          if (raceSortOption === 'date-desc') {
            return b.date.localeCompare(a.date) || b.name.localeCompare(a.name, 'ja');
          }
          if (raceSortOption === 'date-asc') {
            return a.date.localeCompare(b.date) || a.name.localeCompare(b.name, 'ja');
          }
          if (raceSortOption === 'name-asc') {
            return a.name.localeCompare(b.name, 'ja');
          }
          if (raceSortOption === 'balance-desc') {
            const balA = (a.payout || 0) - (a.investment || 0);
            const balB = (b.payout || 0) - (b.investment || 0);
            return balB - balA;
          }
          if (raceSortOption === 'balance-asc') {
            const balA = (a.payout || 0) - (a.investment || 0);
            const balB = (b.payout || 0) - (b.investment || 0);
            return balA - balB;
          }
          return 0;
        });

        return (
          <div className="bg-gray-50 min-h-screen">
            {currentTab === 'balance' ? (
              <div className="max-w-xl mx-auto p-4 animate-fade-in pt-safe pb-24">
                {isSettingsOpen && renderSettings()}
                <div className="flex justify-between items-center mb-6 mt-2 md:mt-4">
                  <h1 className="text-xl font-bold tracking-tight text-green-800 flex items-center gap-2"><TrendingUp className="text-green-600" /> 収支管理{isCloudMode && <CloudIcon className="text-blue-500" size={18} />}</h1>
                  <button onClick={() => setIsSettingsOpen(true)} className="p-2 text-gray-400 hover:text-gray-600 rounded-full bg-white shadow-sm border border-gray-100"><SettingsIcon size={18} /></button>
                </div>

                {/* サマリーカード */}
                <div className="grid grid-cols-2 gap-3 mb-6 text-sm">
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p className="text-xs text-gray-400 font-bold mb-1">総購入金額</p>
                    <p className="text-lg font-bold text-gray-800">{totalInvestment.toLocaleString()}円</p>
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p className="text-xs text-gray-400 font-bold mb-1">総払戻金額</p>
                    <p className="text-lg font-bold text-gray-800">{totalPayout.toLocaleString()}円</p>
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p className="text-xs text-gray-400 font-bold mb-1">トータル収支</p>
                    <p className={`text-lg font-bold ${netBalance >= 0 ? 'text-blue-600' : 'text-red-500'}`}>
                      {netBalance >= 0 ? '+' : ''}{netBalance.toLocaleString()}円
                    </p>
                  </div>
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p className="text-xs text-gray-400 font-bold mb-1">回収率</p>
                    <p className={`text-lg font-bold ${parseFloat(recoveryRate) >= 100 ? 'text-blue-600' : 'text-gray-800'}`}>{recoveryRate}%</p>
                  </div>
                </div>

                {/* タイムラインのソート切り替えUI */}
                <div className="flex justify-between items-center mb-4 text-xs px-1">
                  <span className="font-bold text-gray-400">収支推移タイムライン</span>
                  <div className="flex bg-gray-200/60 p-0.5 rounded-lg font-bold">
                    <button 
                      onClick={() => setBalanceSortOption('asc')} 
                      className={`px-2.5 py-1 rounded-md transition-colors ${balanceSortOption === 'asc' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-500'}`}
                    >
                      古い順
                    </button>
                    <button 
                      onClick={() => setBalanceSortOption('desc')} 
                      className={`px-2.5 py-1 rounded-md transition-colors ${balanceSortOption === 'desc' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-500'}`}
                    >
                      新しい順
                    </button>
                  </div>
                </div>

                {/* 収支リスト (スマホ向け・タイムライン型) */}
                <div className="relative border-l-2 border-green-200 ml-4 pl-6 mr-1 space-y-4">
                  {displayedBalanceData.length === 0 ? (
                    <div className="text-center py-16 bg-white rounded-2xl border border-gray-100 border-dashed -ml-6 pl-0">
                      <p className="text-gray-400 font-medium text-sm">データがありません</p>
                    </div>
                  ) : (
                    displayedBalanceData.map((data) => (
                      <div 
                        key={data.id} 
                        onClick={() => {
                          setActiveRaceId(data.id);
                          setRaceDetailTab('bets');
                        }}
                        className="relative bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex flex-col gap-2.5 animate-fade-in cursor-pointer hover:border-green-300 hover:shadow active:scale-[0.99] transition-all duration-150 group"
                      >
                        {/* タイムラインのドット */}
                        <div className="absolute -left-[31px] top-6 w-3 h-3 rounded-full bg-green-600 border-2 border-white shadow-sm group-hover:scale-110 transition-transform"></div>

            {/* ボトムナビゲーションバー */}

              <button onClick={() => setCurrentTab('memo')} className={`flex flex-col items-center gap-1 transition-colors ${currentTab === 'memo' ? 'text-green-600 font-bold' : 'text-gray-400 hover:text-gray-600'}`}>

      }

      const activeRace = Array.isArray(races) ? races.find(r => r.id === activeRaceId) : null;
      if (!activeRace) { setActiveRaceId(null); return null; }
      
      const currentHorses = Array.isArray(activeRace.horses) ? activeRace.horses : [];
      let filteredAndSorted = currentHorses.filter(horse => { 
        if (filter === 'all') return true; 
        if (filter === 'marked') return ['◎', '〇', '▲', '△', '☆'].includes(horse.mark); 
        if (filter === 'keshi') return horse.mark === '消'; 
        return true; 
      });
      filteredAndSorted.sort((a, b) => { 
        if (sortType === 'number') return (parseInt(a.number)||999) - (parseInt(b.number)||999); 
        const markDiff = MARK_ORDER[a.mark] - MARK_ORDER[b.mark]; 
        if (markDiff !== 0) return markDiff; 
        return (parseInt(a.number)||999) - (parseInt(b.number)||999); 
      });

      const currentBets = Array.isArray(activeRace.bets) ? activeRace.bets : [];
      const totalBetsAmount = currentBets.reduce((sum, b) => sum + (b.totalAmount || 0), 0);

      const WAKU_COLORS = {
        1: 'bg-white text-gray-800 border-gray-300',
        2: 'bg-gray-800 text-white border-gray-900',
        3: 'bg-red-600 text-white border-red-700',
        4: 'bg-blue-600 text-white border-blue-700',
        5: 'bg-yellow-400 text-gray-800 border-yellow-500',
        6: 'bg-green-600 text-white border-green-700',
        7: 'bg-orange-500 text-white border-orange-600',
        8: 'bg-pink-400 text-white border-pink-500'
      };

      const toggleSelectHorse = (rowNum, horseVal) => {
        const setSel = [null, setBetSel1, setBetSel2, setBetSel3][rowNum];
        const sel = [null, betSel1, betSel2, betSel3][rowNum];
        
        if (betMethod === 'box') {
          if (betSel1.includes(horseVal)) {
            setBetSel1(betSel1.filter(v => v !== horseVal));
          } else {
            setBetSel1([...betSel1, horseVal]);
          }
        } else if (betMethod === 'formation') {
          if (sel.includes(horseVal)) {
            setSel(sel.filter(v => v !== horseVal));
          } else {
            setSel([...sel, horseVal]);
          }
        } else {
          if (sel.includes(horseVal)) {
            setSel([]);
          } else {
            setSel([horseVal]);
          }
        }
      };

      const combinationCount = getBetCombinationCount(betType, betMethod, betSel1, betSel2, betSel3, betNagashiAnchorCount, betMulti);
      const totalAmountPreview = combinationCount * (parseInt(betAmountPerBet) || 0);

      const formatBetHorses = (bet) => {
        const { type, method, horses } = bet;
        const [h1Raw, h2Raw, h3Raw] = normalizeHorses(horses);
        
        const toStr = (val) => {
          if (!val) return '';
          if (typeof val === 'object') return val.number || val.name || '';
          return String(val);
        };
        const h1 = h1Raw.map(toStr).filter(Boolean);
        const h2 = h2Raw.map(toStr).filter(Boolean);
        const h3 = h3Raw.map(toStr).filter(Boolean);
        
        if (method === 'box') {
          return `${h1.join(', ')} (ボックス)`;
        }

        if (method === 'nagashi') {
          const multiSuffix = bet.multi ? ' (マルチ)' : '';
          if (type === '3連複' || type === '3連単') {
            if (bet.anchorCount === 2) {
              return `軸: ${h1[0] || '-'}, ${h2[0] || '-'} ➔ 相手: ${h3.join(', ')}${multiSuffix}`;
            }
            return `軸: ${h1[0] || '-'} ➔ 相手: ${h2.join(', ')}${multiSuffix}`;
          }
          return `軸: ${h1[0] || '-'} ➔ 相手: ${h2.join(', ')}${multiSuffix}`;
        }
        
        if (type === '単勝' || type === '複勝') {
          return h1.join(', ');
        }
        
        if (type === '3連複' || type === '3連単') {
          if (method === 'formation') {
            return `${h1.join(',')} → ${h2.join(',')} → ${h3.join(',')}`;
          }
          return `${h1[0] || '-'} → ${h2[0] || '-'} → ${h3[0] || '-'}`;
        }
        
        if (method === 'formation') {
          return `${h1.join(',')} - ${h2.join(',')}`;
        }
        return `${h1[0] || '-'} - ${h2[0] || '-'}`;
      };

      const renderBetHorses = (bet, result) => {
        const { type, method, horses } = bet;
        const [h1Raw, h2Raw, h3Raw] = normalizeHorses(horses);
        
        const toStr = (val) => {
          if (!val) return '';
          if (typeof val === 'object') return val.number || val.name || '';
          return String(val);
        };
        const h1 = h1Raw.map(toStr).filter(Boolean);
        const h2 = h2Raw.map(toStr).filter(Boolean);
        const h3 = h3Raw.map(toStr).filter(Boolean);

        const formatHorseNum = (val) => {
          const num = toStr(val);
          if (!num) return <span>-</span>;
          if (!result) return <span>{num}</span>;
          
          let badge = null;
          if (result.first && result.first === num) {
            badge = <span className="inline-flex items-center justify-center w-3.5 h-3.5 rounded-full bg-yellow-500 text-white text-[8px] font-extrabold ml-1 shadow-sm">1</span>;
          } else if (result.second && result.second === num) {
            badge = <span className="inline-flex items-center justify-center w-3.5 h-3.5 rounded-full bg-slate-400 text-white text-[8px] font-extrabold ml-1 shadow-sm">2</span>;
          } else if (result.third && result.third === num) {
            badge = <span className="inline-flex items-center justify-center w-3.5 h-3.5 rounded-full bg-amber-600 text-white text-[8px] font-extrabold ml-1 shadow-sm">3</span>;
          }

          if (badge) {
            return (
              <span key={num} className="inline-flex items-center bg-yellow-100 text-yellow-800 font-extrabold px-1.5 py-0.5 rounded border border-yellow-200 mx-0.5">
                {num}{badge}
              </span>
            );
          }
          return <span key={num} className="text-gray-800 mx-0.5 font-bold">{num}</span>;
        };

        const renderGroup = (arr) => {
          if (!Array.isArray(arr) || arr.length === 0) return <span>-</span>;
          return (
            <span className="inline-flex flex-wrap items-center">
              {arr.map((num, idx) => (
                <React.Fragment key={idx}>
                  {idx > 0 && <span className="text-gray-400 font-normal mr-1">,</span>}
                  {formatHorseNum(num)}
                </React.Fragment>
              ))}
            </span>
          );
        };

        if (method === 'nagashi') {
          const isMulti = bet.multi;
          const multiBadge = isMulti ? <span className="text-[10px] text-red-600 bg-red-50 border border-red-100 rounded px-1 font-bold ml-1">マルチ</span> : null;
          if (type === '3連複' || type === '3連単') {
            if (bet.anchorCount === 2) {
              return (
                <div className="flex flex-wrap items-center gap-1">
                  <span className="text-xs text-gray-400 font-normal mr-0.5">軸:</span>
                  {formatHorseNum(h1[0])}
                  <span className="text-gray-300 font-normal mx-0.5">,</span>
                  {formatHorseNum(h2[0])}
                  <span className="text-gray-300 font-normal mx-0.5">➔</span>
                  <span className="text-xs text-gray-400 font-normal mr-0.5">相手:</span>
                  {renderGroup(h3)}
                  {multiBadge}
                </div>
              );
            }
            return (
              <div className="flex flex-wrap items-center gap-1">
                <span className="text-xs text-gray-400 font-normal mr-0.5">軸:</span>
                {formatHorseNum(h1[0])}
                <span className="text-gray-300 font-normal mx-0.5">➔</span>
                <span className="text-xs text-gray-400 font-normal mr-0.5">相手:</span>
                {renderGroup(h2)}
                {multiBadge}
              </div>
            );
          }
          return (
            <div className="flex flex-wrap items-center gap-1">
              <span className="text-xs text-gray-400 font-normal mr-0.5">軸:</span>
              {formatHorseNum(h1[0])}
              <span className="text-gray-300 font-normal mx-0.5">➔</span>
              <span className="text-xs text-gray-400 font-normal mr-0.5">相手:</span>
              {renderGroup(h2)}
              {multiBadge}
            </div>
          );
        }

        if (method === 'box') {
          return (
            <div className="flex flex-wrap items-center">
              {renderGroup(h1)}
              <span className="text-xs text-gray-400 font-normal ml-1">(ボックス)</span>
            </div>
          );
        }

        if (type === '単勝' || type === '複勝') {
          return renderGroup(h1);
        }

        if (type === '3連複' || type === '3連単') {
          if (method === 'formation') {
            return (
              <div className="flex flex-wrap items-center gap-1">
                {renderGroup(h1)}
                <span className="text-gray-300 font-normal mx-0.5">→</span>
                {renderGroup(h2)}
                <span className="text-gray-300 font-normal mx-0.5">→</span>
                {renderGroup(h3)}
              </div>
            );
          }
          return (
            <div className="flex flex-wrap items-center gap-1">
              {formatHorseNum(h1[0])}
              <span className="text-gray-300 font-normal mx-0.5">→</span>
              {formatHorseNum(h2[0])}
              <span className="text-gray-300 font-normal mx-0.5">→</span>
              {formatHorseNum(h3[0])}
            </div>
          );
        }

        if (method === 'formation') {
          return (
            <div className="flex flex-wrap items-center gap-1">
              {renderGroup(h1)}
              <span className="text-gray-300 font-normal mx-0.5">-</span>
              {renderGroup(h2)}
            </div>
          );
        }
        return (
          <div className="flex flex-wrap items-center gap-1">
            {formatHorseNum(h1[0])}
            <span className="text-gray-300 font-normal mx-0.5">-</span>
            {formatHorseNum(h2[0])}
          </div>
        );
      };

      const expandBet = (bet, result) => {
        const { type, method, horses } = bet;
        const [h1Raw, h2Raw, h3Raw] = normalizeHorses(horses);
        
        const toStr = (val) => {
          if (!val) return '';
          if (typeof val === 'object') return val.number || val.name || '';
          return String(val);
        };
        const h1 = h1Raw.map(toStr).filter(Boolean);
        const h2 = h2Raw.map(toStr).filter(Boolean);
        const h3 = h3Raw.map(toStr).filter(Boolean);
        
        const combinations = [];
        
        const first = result?.first || '';
        const second = result?.second || '';
        const third = result?.third || '';

        const sortNums = (...args) => args.map(Number).sort((a,b)=>a-b).map(String).join('-');

        if (type === '単勝') {
          h1.forEach(num => {
            const isHit = first && first === num;
            combinations.push({ text: `${num}`, isHit });
          });
        } else if (type === '複勝') {
          h1.forEach(num => {
            const isHit = num && [first, second, third].filter(Boolean).includes(num);
            combinations.push({ text: `${num}`, isHit });
          });
        } else if (type === '馬連' || type === 'ワイド' || type === '枠連') {
          if (method === 'box') {
            for (let i = 0; i < h1.length; i++) {
              for (let j = i + 1; j < h1.length; j++) {
                const a = h1[i];
                const b = h1[j];
                const isHit = first && second && sortNums(a, b) === sortNums(first, second);
                combinations.push({ text: `${a} - ${b}`, isHit });
              }
            }
          } else if (method === 'formation') {
            const seen = new Set();
            h1.forEach(a => {
              h2.forEach(b => {
                if (a === b) return;
                const key = sortNums(a, b);
                if (seen.has(key)) return;
                seen.add(key);
                const isHit = first && second && key === sortNums(first, second);
                combinations.push({ text: `${a} - ${b}`, isHit });
              });
            });
          } else if (method === 'nagashi') {
            const anchor = h1[0];
            if (anchor) {
              h2.forEach(b => {
                if (anchor === b) return;
                const isHit = first && second && sortNums(anchor, b) === sortNums(first, second);
                combinations.push({ text: `${anchor} - ${b}`, isHit });
              });
            }
          } else {
            const a = h1[0];
            const b = h2[0];
            if (a && b) {
              const isHit = first && second && sortNums(a, b) === sortNums(first, second);
              combinations.push({ text: `${a} - ${b}`, isHit });
            }
          }
        } else if (type === '馬単') {
          if (method === 'box') {
            for (let i = 0; i < h1.length; i++) {
              for (let j = 0; j < h1.length; j++) {
                if (i === j) continue;
                const a = h1[i];
                const b = h1[j];
                const isHit = first && second && first === a && second === b;
                combinations.push({ text: `${a} → ${b}`, isHit });
              }
            }
          } else if (method === 'formation') {
            h1.forEach(a => {
              h2.forEach(b => {
                if (a === b) return;
                const isHit = first && second && first === a && second === b;
                combinations.push({ text: `${a} → ${b}`, isHit });
              });
            });
          } else if (method === 'nagashi') {
            const anchor = h1[0];
            const isMulti = bet.multi;
            if (anchor) {
              h2.forEach(b => {
                if (anchor === b) return;
                const isHitOmote = first && second && first === anchor && second === b;
                combinations.push({ text: `${anchor} → ${b}`, isHit: isHitOmote });
                if (isMulti) {
                  const isHitUra = first && second && first === b && second === anchor;
                  combinations.push({ text: `${b} → ${anchor}`, isHit: isHitUra });
                }
              });
            }
          } else {
            const a = h1[0];
            const b = h2[0];
            if (a && b) {
              const isHit = first && second && first === a && second === b;
              combinations.push({ text: `${a} → ${b}`, isHit: isHit });
            }
          }
        } else if (type === '3連複') {
          if (method === 'box') {
            for (let i = 0; i < h1.length; i++) {
              for (let j = i + 1; j < h1.length; j++) {
                for (let k = j + 1; k < h1.length; k++) {
                  const a = h1[i];
                  const b = h1[j];
                  const c = h1[k];
                  const isHit = first && second && third && sortNums(a, b, c) === sortNums(first, second, third);
                  combinations.push({ text: `${a} - ${b} - ${c}`, isHit });
                }
              }
            }
          } else if (method === 'formation') {
            const seen = new Set();
            h1.forEach(a => {
              h2.forEach(b => {
                if (a === b) return;
                h3.forEach(c => {
                  if (a === c || b === c) return;
                  const key = sortNums(a, b, c);
                  if (seen.has(key)) return;
                  seen.add(key);
                  const isHit = first && second && third && key === sortNums(first, second, third);
                  combinations.push({ text: `${a} - ${b} - ${c}`, isHit });
                });
              });
            });
          } else if (method === 'nagashi') {
            if (bet.anchorCount === 2) {
              const a = h1[0];
              const b = h2[0];
              if (a && b && a !== b) {
                h3.forEach(c => {
                  if (a === c || b === c) return;
                  const isHit = first && second && third && sortNums(a, b, c) === sortNums(first, second, third);
                  combinations.push({ text: `${a} - ${b} - ${c}`, isHit });
                });
              }
            } else {
              const a = h1[0];
              if (a) {
                const partners = h2.filter(h => h !== a);
                for (let i = 0; i < partners.length; i++) {
                  for (let j = i + 1; j < partners.length; j++) {
                    const b = partners[i];
                    const c = partners[j];
                    const isHit = first && second && third && sortNums(a, b, c) === sortNums(first, second, third);
                    combinations.push({ text: `${a} - ${b} - ${c}`, isHit });
                  }
                }
              }
            }
          } else {
            const a = h1[0];
            const b = h2[0];
            const c = h3[0];
            if (a && b && c) {
              const isHit = first && second && third && sortNums(a, b, c) === sortNums(first, second, third);
              combinations.push({ text: `${a} - ${b} - ${c}`, isHit });
            }
          }
        } else if (type === '3連単') {
          if (method === 'box') {
            for (let i = 0; i < h1.length; i++) {
              for (let j = 0; j < h1.length; j++) {
                if (i === j) continue;
                for (let k = 0; k < h1.length; k++) {
                  if (i === k || j === k) continue;
                  const a = h1[i];
                  const b = h1[j];
                  const c = h1[k];
                  const isHit = first && second && third && first === a && second === b && third === c;
                  combinations.push({ text: `${a} → ${b} → ${c}`, isHit });
                }
              }
            }
          } else if (method === 'formation') {
            h1.forEach(a => {
              h2.forEach(b => {
                if (a === b) return;
                h3.forEach(c => {
                  if (a === c || b === c) return;
                  const isHit = first && second && third && first === a && second === b && third === c;
                  combinations.push({ text: `${a} → ${b} → ${c}`, isHit });
                });
              });
            });
          } else if (method === 'nagashi') {
            const isMulti = bet.multi;
            if (bet.anchorCount === 2) {
              const a = h1[0];
              const b = h2[0];
              if (a && b && a !== b) {
                h3.forEach(c => {
                  if (a === c || b === c) return;
                  const patterns = isMulti 
                    ? [
                        [a, b, c], [a, c, b], [c, a, b],
                        [b, a, c], [b, c, a], [c, b, a]
                      ]
                    : [[a, b, c], [b, a, c]];
                  
                  patterns.forEach(([p1, p2, p3]) => {
                    const isHit = first && second && third && first === p1 && second === p2 && third === p3;
                    combinations.push({ text: `${p1} → ${p2} → ${p3}`, isHit });
                  });
                });
              }
            } else {
              const a = h1[0];
              if (a) {
                const partners = h2.filter(h => h !== a);
                for (let i = 0; i < partners.length; i++) {
                  for (let j = 0; j < partners.length; j++) {
                    if (i === j) continue;
                    const b = partners[i];
                    const c = partners[j];
                    
                    const patterns = isMulti
                      ? [
                          [a, b, c], [b, a, c], [b, c, a]
                        ]
                      : [[a, b, c]];
                      
                    patterns.forEach(([p1, p2, p3]) => {
                      const isHit = first && second && third && first === p1 && second === p2 && third === p3;
                      combinations.push({ text: `${p1} → ${p2} → ${p3}`, isHit });
                    });
                  }
                }
              }
            }
          } else {
            const a = h1[0];
            const b = h2[0];
            const c = h3[0];
            if (a && b && c) {
              const isHit = first && second && third && first === a && second === b && third === c;
              combinations.push({ text: `${a} → ${b} → ${c}`, isHit });
            }
          }
        }
        
        return combinations;
      };

      const handleCopyBets = (race) => {

        const investment = race.investment || 0;
        const payout = race.payout || 0;

        text += `購入金額: ${investment.toLocaleString()}円\n`;
        text += `払戻金額: ${payout.toLocaleString()}円\n`;
        text += `収支: ${balance >= 0 ? '+' : ''}${balance.toLocaleString()}円\n\n`;
        
        if (bets.length > 0) {

            text += `・${b.type} ${methodLabel} (${b.combinationCount}点 × 各${b.amountPerBet}円) = ${(b.totalAmount || 0).toLocaleString()}円\n`;
            text += `  ${formatBetHorses(b)}\n`;

        } else {
          text += `登録された買い目はありません。`;

        const textArea = document.createElement("textarea"); 
        textArea.value = text.trim(); 
        textArea.style.position = "absolute"; 
        textArea.style.left = "-999999px";
        document.body.appendChild(textArea); 
        textArea.select();
        try {

            <div className="flex-1 text-center"><h2 className="text-base font-bold text-gray-900 truncate px-2">{activeRace.name}</h2></div>
            <button

            >
              <CopyIcon size={20} />

            </button>
          </div>

          <div className="flex border-b border-gray-100 text-sm font-bold bg-gray-50/50">
            <button onClick={() => setRaceDetailTab('predict')} className={`flex-1 py-3 text-center transition-colors ${raceDetailTab === 'predict' ? 'text-green-600 border-b-2 border-green-600 bg-white' : 'text-gray-400 hover:text-gray-600'}`}>予想印</button>
            <button onClick={() => setRaceDetailTab('bets')} className={`flex-1 py-3 text-center transition-colors ${raceDetailTab === 'bets' ? 'text-green-600 border-b-2 border-green-600 bg-white' : 'text-gray-400 hover:text-gray-600'}`}>買い目・収支</button>
          </div>

          <div className="p-4">
            {raceDetailTab === 'predict' ? (
              <div className="space-y-4 animate-fade-in">
                <div className="mb-6">

                            >

                              {[1, 2].map(num => (

                                  className={`px-3 py-1.5 rounded-lg border transition-colors ${betNagashiAnchorCount === num ? 'bg-green-600 text-white border-green-600' : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}`}

                      <div className="flex flex-wrap gap-2">

                              type="button"
                              onClick={() => toggleSelectHorse(1, String(waku))}
                              className={`w-9 h-9 rounded-full flex items-center justify-center font-bold border-2 transition-all ${betSel1.includes(String(waku)) ? 'ring-2 ring-green-600 ring-offset-2 scale-105' : 'opacity-80'} ${WAKU_COLORS[waku]}`}

                        ) : (
                          currentHorses.length === 0 ? (
                            <p className="text-xs text-gray-400 italic">先に予想印タブで馬を登録してください</p>

                              const val = h.number || h.name;

                                <button
                                  key={h.id}
                                  type="button"
                                  onClick={() => toggleSelectHorse(1, val)}
